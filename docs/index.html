<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNI Trade Sheet Manager - Australia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bni-red: #CF2030;
      --bni-red-dark: #A81828;
      --bni-red-light: #E8394A;
      --bni-grey: #58595B;
      --bni-grey-light: #8C8D8F;
      --bni-grey-lighter: #F5F5F5;
      --bni-dark: #1A1A1A;
      --bni-white: #FFFFFF;
      --bni-gold: #C5A55A;
      --bni-success: #10B981;
      --bni-warning: #F59E0B;
      --bni-info: #3B82F6;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.1);
      --shadow-xl: 0 20px 50px -5px rgba(0,0,0,0.15);
      --radius: 8px;
      --radius-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; background: #F0F1F3; color: var(--bni-dark); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* Login Page */
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bni-dark) 0%, #2D1015 50%, var(--bni-red-dark) 100%); position: relative; overflow: hidden; }
    .login-wrapper::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: rgba(207,32,48,0.08); top: -200px; right: -200px; }
    .login-wrapper::after { content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%; background: rgba(207,32,48,0.05); bottom: -100px; left: -100px; }
    .login-card { background: white; border-radius: var(--radius-lg); padding: 48px; width: 420px; box-shadow: var(--shadow-xl); position: relative; z-index: 1; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .bni-mark { width: 80px; height: 80px; background: var(--bni-red); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .login-logo .bni-mark span { color: white; font-weight: 900; font-size: 28px; letter-spacing: 2px; }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--bni-dark); }
    .login-logo p { color: var(--bni-grey-light); font-size: 14px; margin-top: 4px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--bni-grey); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: var(--radius); font-size: 15px; font-family: inherit; transition: all 0.2s; outline: none; background: white; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--bni-red); box-shadow: 0 0 0 3px rgba(207,32,48,0.1); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn { padding: 12px 24px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--bni-red); color: white; }
    .btn-primary:hover { background: var(--bni-red-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-secondary { background: #E5E7EB; color: var(--bni-grey); }
    .btn-secondary:hover { background: #D1D5DB; }
    .btn-success { background: var(--bni-success); color: white; }
    .btn-success:hover { background: #059669; }
    .btn-warning { background: var(--bni-warning); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--bni-red); color: var(--bni-red); }
    .btn-outline:hover { background: var(--bni-red); color: white; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-lg { padding: 14px 32px; font-size: 16px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-ghost { background: transparent; color: var(--bni-grey); }
    .btn-ghost:hover { background: #F3F4F6; }
    .btn-danger { background: #EF4444; color: white; }
    .btn-danger:hover { background: #DC2626; }

    .error-msg { color: var(--bni-red); font-size: 13px; margin-top: 8px; }

    /* Layout */
    .app-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--bni-dark); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
    .sidebar-logo { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
    .sidebar-logo .mark { width: 40px; height: 40px; background: var(--bni-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-logo .mark span { color: white; font-weight: 800; font-size: 14px; }
    .sidebar-logo h2 { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .sidebar-logo small { font-size: 11px; color: rgba(255,255,255,0.4); }

    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section { margin-bottom: 24px; }
    .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); padding: 0 12px; margin-bottom: 8px; font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; font-size: 14px; color: rgba(255,255,255,0.65); font-weight: 500; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active { background: var(--bni-red); color: white; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-user { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
    .sidebar-user .avatar { width: 36px; height: 36px; background: var(--bni-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .sidebar-user .info { flex: 1; min-width: 0; }
    .sidebar-user .name { font-size: 13px; font-weight: 600; }
    .sidebar-user .role { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }

    .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
    .page-header { background: white; padding: 24px 32px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--bni-dark); }
    .page-header p { font-size: 14px; color: var(--bni-grey-light); margin-top: 2px; }
    .page-body { padding: 32px; }

    /* Cards */
    .card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid #E5E7EB; overflow: hidden; }
    .card-header { padding: 20px 24px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 16px; font-weight: 600; }
    .card-body { padding: 24px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid #E5E7EB; position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.red::after { background: var(--bni-red); }
    .stat-card.green::after { background: var(--bni-success); }
    .stat-card.blue::after { background: var(--bni-info); }
    .stat-card.gold::after { background: var(--bni-gold); }
    .stat-card .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .stat-card.red .stat-icon { background: #FEE2E2; color: var(--bni-red); }
    .stat-card.green .stat-icon { background: #D1FAE5; color: var(--bni-success); }
    .stat-card.blue .stat-icon { background: #DBEAFE; color: var(--bni-info); }
    .stat-card.gold .stat-icon { background: #FEF3C7; color: var(--bni-warning); }
    .stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--bni-dark); line-height: 1; }
    .stat-card .stat-label { font-size: 13px; color: var(--bni-grey-light); margin-top: 4px; font-weight: 500; }

    /* Tables */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    table th { text-align: left; padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--bni-grey-light); font-weight: 600; background: #FAFAFA; border-bottom: 1px solid #E5E7EB; }
    table td { padding: 14px 16px; border-bottom: 1px solid #F3F4F6; font-size: 14px; }
    table tr:hover td { background: #FAFAFA; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-draft { background: #F3F4F6; color: var(--bni-grey); }
    .badge-pending { background: #FEF3C7; color: #92400E; }
    .badge-review { background: #DBEAFE; color: #1E40AF; }
    .badge-approved { background: #D1FAE5; color: #065F46; }
    .badge-printing { background: #EDE9FE; color: #5B21B6; }
    .badge-shipped { background: #D1FAE5; color: #065F46; }
    .badge-active { background: #D1FAE5; color: #065F46; }
    .badge-forming { background: #FEF3C7; color: #92400E; }

    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    /* ===== TRADE SHEET SYSTEM ===== */
    .ts-editor { display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: start; }
    .ts-canvas { background: #c8c8c8; border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: flex-start; justify-content: center; min-height: 700px; overflow: auto; }
    .ts-scale-wrap { width: 437px; height: 605px; overflow: hidden; flex-shrink: 0; }
    .ts-a4 { width: 2665px; height: 3692px; transform: scale(0.164); transform-origin: top left; background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.35); font-family: 'Helvetica Neue LT Std', 'Helvetica Neue', 'Roboto', Helvetica, Arial, sans-serif; position: relative; overflow: hidden; }
    .ts-panel { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid #E5E7EB; overflow: hidden; }

    /* Top red banner */
    .ts-topbar { background: var(--bni-red); color: white; display: flex; align-items: center; padding: 12px 14px; flex-shrink: 0; min-height: 83px; }
    .ts-topbar-logo { font-weight: 900; font-size: 28px; letter-spacing: 1px; white-space: nowrap; }
    .ts-topbar-chapter { font-weight: 300; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; margin-left: 4px; }
    .ts-topbar-right { margin-left: auto; text-align: right; font-size: 10px; line-height: 1.4; opacity: 0.95; }
    .ts-topbar-sub { font-size: 16px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-left: auto; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

    /* Section headers - RED bg white text matching photos */
    .ts-hdr { background: var(--bni-red); color: white; font-size: 11px; font-weight: 800; padding: 3px 6px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0; line-height: 1.2; }
    .ts-hdr-dk { font-size: 11px; font-weight: 800; color: var(--bni-dark); border-bottom: 2px solid var(--bni-red); padding-bottom: 2px; margin-bottom: 0; line-height: 1.2; }

    /* Standard trade sheet table */
    .ts-tbl { width: 100%; border-collapse: collapse; font-size: 10px; line-height: 1.3; }
    .ts-tbl th { background: var(--bni-red); color: white; padding: 3px 5px; text-align: left; font-weight: 700; font-size: 9px; text-transform: uppercase; }
    .ts-tbl td { padding: 4px 5px; border-bottom: 1px solid #e0e0e0; }
    .ts-tbl tr:nth-child(even) td { background: #f7f7f7; }

    /* Leadership table - bordered, tight */
    .ts-lead { width: 100%; border-collapse: collapse; font-size: 10px; line-height: 1.35; border: 1px solid #ccc; }
    .ts-lead td { padding: 4px 6px; border: 1px solid #ddd; }
    .ts-lead td:first-child { font-weight: 700; width: 45%; background: #f9f9f9; }

    /* Referral table - fills full page height, source-image scale (2665x3692) */
    .ts-ref { width: 100%; border-collapse: collapse; font-size: 28px; line-height: 1.15; }
    .ts-ref th { padding: 12px; text-align: center; font-weight: 700; font-size: 28px; border-bottom: 3px solid #999; background: white; color: #333; }
    .ts-ref tr { height: 215px; }
    .ts-ref td { border-bottom: 2px solid #ddd; vertical-align: middle; padding: 10px; }
    .ts-ref tr:nth-child(even) td { background: transparent; }
    .ts-ref .rc-num { width: 70px; text-align: center; font-weight: 700; font-size: 30px; vertical-align: middle; }
    .ts-ref .rc-member { text-align: center; }
    .ts-ref .rc-member .m-name { font-weight: 700; font-size: 30px; color: #111; line-height: 1.15; }
    .ts-ref .rc-member .m-phone { font-size: 24px; color: #333; line-height: 1.15; }
    .ts-ref .rc-member .m-email { font-size: 22px; color: #555; line-height: 1.15; word-break: break-all; letter-spacing: 0.5px; }
    .ts-ref .rc-member .m-role { font-size: 22px; color: var(--bni-red); font-weight: 400; line-height: 1.15; font-style: italic; }
    .ts-ref .rc-biz { font-size: 26px; text-align: center; vertical-align: middle; }
    .ts-ref .rc-cat { font-size: 26px; text-align: center; vertical-align: middle; }
    .ts-ref .rc-req { border-left: 3px solid #ccc; }

    /* VP Report table */
    .ts-vp { width: 100%; border-collapse: collapse; font-size: 9px; line-height: 1.3; border: 1px solid #ccc; }
    .ts-vp th { background: var(--bni-red); color: white; padding: 3px 4px; font-size: 8px; font-weight: 700; text-align: center; border: 1px solid var(--bni-red-dark); }
    .ts-vp th:first-child { text-align: left; }
    .ts-vp td { padding: 3px 4px; border: 1px solid #ddd; }
    .ts-vp td:not(:first-child) { text-align: center; }

    /* Footer */
    .ts-foot { background: var(--bni-red); color: white; text-align: center; padding: 5px 8px; font-size: 10px; font-weight: 600; font-style: italic; flex-shrink: 0; line-height: 1.3; }

    /* Form Elements */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--bni-dark); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; transition: all 0.2s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--bni-red); box-shadow: 0 0 0 3px rgba(207,32,48,0.1); }
    .form-group textarea { resize: vertical; min-height: 50px; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal { background: white; border-radius: var(--radius-lg); width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-xl); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 18px; font-weight: 700; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #E5E7EB; display: flex; justify-content: flex-end; gap: 12px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid #E5E7EB; margin-bottom: 24px; }
    .tab { padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--bni-grey-light); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab:hover { color: var(--bni-dark); }
    .tab.active { color: var(--bni-red); border-bottom-color: var(--bni-red); font-weight: 600; }

    /* Status Pipeline */
    .status-pipeline { display: flex; gap: 0; margin: 20px 0; background: #F3F4F6; border-radius: var(--radius); overflow: hidden; }
    .pipeline-step { flex: 1; padding: 12px 16px; text-align: center; font-size: 12px; font-weight: 600; color: var(--bni-grey-light); position: relative; transition: all 0.3s; }
    .pipeline-step.active { background: var(--bni-red); color: white; }
    .pipeline-step.completed { background: var(--bni-success); color: white; }
    .pipeline-step .step-label { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 40px; color: var(--bni-grey-light); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--bni-grey); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* Drag handle */
    .drag-handle { cursor: grab; color: var(--bni-grey-light); padding: 4px; }
    .drag-handle:active { cursor: grabbing; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }

    /* Filter bar */
    .filter-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-bar select { padding: 8px 12px; border: 2px solid #E5E7EB; border-radius: var(--radius); font-size: 13px; font-family: inherit; outline: none; }
    .filter-bar select:focus { border-color: var(--bni-red); }
    .search-input { position: relative; }
    .search-input input { padding: 8px 12px 8px 36px; border: 2px solid #E5E7EB; border-radius: var(--radius); font-size: 13px; font-family: inherit; outline: none; width: 240px; }
    .search-input input:focus { border-color: var(--bni-red); }
    .search-input svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--bni-grey-light); }

    /* ========== MODULAR TRADESHEET SYSTEM ==========
       Page-builder approach. Pages are 216 x 303 mm (A4 + 3mm bleed on every edge).
       The trim area (the visible 210 x 297 mm) is a 12-col x 70-row grid.
       Blocks declare their col/row span and an optional bleed direction. */

    /* Editor canvas */
    .tsm-canvas { background:#c8c8c8; border-radius:var(--radius-lg); padding:24px; min-height:700px; overflow:auto; }
    .tsm-stack { display:flex; flex-direction:column; align-items:center; gap:24px; }

    /* One full bleed page - this is what the printer receives, unscaled */
    .tsm-page {
      width: 216mm;
      height: 303mm;
      position: relative;
      background: white;
      box-shadow: 0 2px 18px rgba(0,0,0,0.25);
      overflow: hidden;
      font-family: 'Helvetica Neue', 'HelveticaNeueLTStd', 'Roboto', Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .tsm-page * { box-sizing: border-box; }

    /* Faint dashed trim line for the editor (inside .tsm-page at 3mm offset) - hidden in print */
    .tsm-trim-guide {
      position: absolute; top: 3mm; left: 3mm; right: 3mm; bottom: 3mm;
      border: 1px dashed rgba(0,0,255,0.18);
      pointer-events: none; z-index: 999;
    }

    /* Safe area = trim. Now used as an absolute-positioning origin for blocks (frame coords in mm). */
    .tsm-safe { position: absolute; inset: 0; }
    /* Bleed layer - blocks that bleed live here, positioned with bleed-extending frame style */
    .tsm-bleed-layer { position:absolute; inset:0; }

    /* Snap-to-grid overlay (visible in editor only) */
    .tsm-grid-overlay { position:absolute; inset:0; pointer-events:none; opacity:0.35; }

    /* Selection chrome */
    .tsm-block.tsm-selected { outline: 1.5px solid var(--bni-red); outline-offset: 0; z-index: 5; }
    .tsm-handle { position:absolute; width:9px; height:9px; background:white; border:1.5px solid var(--bni-red); border-radius:50%; z-index:6; transform:translate(-50%,-50%); }
    .tsm-handle.nw { left:0; top:0; cursor:nwse-resize; }
    .tsm-handle.n { left:50%; top:0; cursor:ns-resize; }
    .tsm-handle.ne { left:100%; top:0; cursor:nesw-resize; }
    .tsm-handle.e { left:100%; top:50%; cursor:ew-resize; }
    .tsm-handle.se { left:100%; top:100%; cursor:nwse-resize; }
    .tsm-handle.s { left:50%; top:100%; cursor:ns-resize; }
    .tsm-handle.sw { left:0; top:100%; cursor:nesw-resize; }
    .tsm-handle.w { left:0; top:50%; cursor:ew-resize; }
    .tsm-edit-mode .tsm-block { cursor: move; }

    /* === BLOCK BASE === */
    /* Each grid item stretches to fill its row span and lays out children as a column.
       Sub-blocks declare flex:1 on the part that should fill remaining space. */
    .tsm-block { position:relative; overflow:hidden; min-width:0; min-height:0; display:flex; flex-direction:column; height:100%; }
    .tsm-block > * { min-height:0; }

    /* Bleed-extending wrappers (used when a block is placed in .tsm-bleed-layer) */
    .tsm-block-bleed { position:absolute; }

    /* === HEADER BAR === Red top bar with chapter logo + date/venue panel */
    .tsm-header {
      background: var(--bni-red);
      color: white;
      display: flex;
      align-items: stretch;
      width: 100%;
      height: 100%;
      position: relative;
    }
    .tsm-header__brand { flex: 1; display:flex; align-items:center; padding: 4mm 6mm 4mm 6mm; gap: 3mm; }
    .tsm-header__logo { font-weight: 900; font-size: 11.5mm; letter-spacing: 0.3mm; line-height: 1; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .tsm-header__chapter { font-weight: 200; font-size: 11.5mm; letter-spacing: 1.6mm; text-transform: uppercase; line-height: 1; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .tsm-header__sub { margin-left: auto; font-weight: 200; font-size: 7mm; letter-spacing: 1.2mm; text-transform: uppercase; line-height: 1; padding-right: 6mm; align-self: center; }
    .tsm-header__panel {
      background: var(--bni-red);
      width: 75mm;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3mm 5mm 4mm 5mm;
      text-align: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: white;
      gap: 1.2mm;
    }
    .tsm-header__panel--detached {
      position: absolute; top: 4mm; right: 6mm; bottom: 4mm; width: 70mm;
      border-left: 0;
    }
    .tsm-header__date { font-size: 5mm; line-height: 1.05; font-weight: 200; letter-spacing: -0.05mm; }
    .tsm-header__date b { font-weight: 600; }
    .tsm-header__date sup { font-size: 0.6em; font-weight: 600; vertical-align: super; }
    .tsm-header__rule { width: 60%; height: 0.4mm; background: white; opacity: 0.9; margin: 0.6mm 0; }
    .tsm-header__venue { font-size: 4.4mm; font-weight: 200; line-height: 1.15; }
    .tsm-header__address { font-size: 3.6mm; font-weight: 200; line-height: 1.15; }

    /* === WELCOME TITLE === Outlined hairline title under header bar */
    .tsm-welcome {
      width:100%; height:100%; display:flex; align-items:center; justify-content:center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 200;
      letter-spacing: 0.3mm;
      color: var(--bni-red);
      text-transform: uppercase;
      line-height: 1;
      padding: 0 6mm;
      white-space: nowrap;
      overflow: hidden;
    }
    .tsm-welcome__txt { display:inline-block; font-size: 14mm; transform-origin: center center; }

    /* === SECTION HEADER (red bar with white text) === Reusable for "BNI Meeting Agenda" etc */
    .tsm-section-h {
      background: var(--bni-red);
      color: white;
      font-weight: 700;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 1.2mm 3mm;
      font-size: 4.5mm;
      line-height: 1.1;
      letter-spacing: 0.05mm;
    }

    /* === MEETING AGENDA === Numbered list */
    .tsm-agenda { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 1.5mm 3mm 0; font-size: 3.0mm; line-height: 1.32; color: #2a2a2a; }
    .tsm-agenda ol { list-style: none; counter-reset: ag; padding-left: 0; }
    .tsm-agenda li { counter-increment: ag; position: relative; padding: 0.1mm 0 0.1mm 6mm; }
    .tsm-agenda li::before { content: counter(ag) "."; position: absolute; left: 0; width: 5.5mm; text-align: left; font-weight: 600; color: var(--bni-red); }

    /* === PHILOSOPHY === Body paragraph block */
    .tsm-phil { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 0 4mm; }
    .tsm-phil__title { color: var(--bni-red); font-weight: 800; font-size: 5.5mm; line-height: 1.1; padding: 0; margin-bottom: 1.5mm; }
    .tsm-phil__body { font-size: 3.4mm; line-height: 1.45; color: #1a1a1a; }
    .tsm-phil__body p { margin: 0 0 2mm 0; }

    /* === VISITOR RESOURCES === Red panel with QR */
    .tsm-vr { background: var(--bni-red); color: white; padding: 3mm; display: flex; flex-direction: column; align-items: center; gap: 1.5mm; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-align: center; }
    .tsm-vr__title { font-weight: 800; font-size: 5.2mm; line-height: 1.05; }
    .tsm-vr__msg { font-weight: 300; font-size: 2.7mm; line-height: 1.3; padding: 0 1mm; }
    .tsm-vr__qr { background: white; padding: 1mm; border-radius: 0.5mm; width: 26mm; height: 26mm; display: flex; align-items:center; justify-content:center; }
    .tsm-vr__qr img { width:100%; height:100%; object-fit:contain; }
    .tsm-vr__qr-fallback { width:100%; height:100%; background: repeating-linear-gradient(45deg, #fff 0 1mm, #000 1mm 1.6mm); }

    /* === LEADERSHIP TEAM === 2-col table that auto-grows */
    .tsm-lead { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width: 100%; flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .tsm-lead__rows { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .tsm-lead__row { flex: 1; display: grid; grid-template-columns: 49% 51%; align-items: center; padding: 0.8mm 2mm; font-size: 3.0mm; line-height: 1.15; min-height: 0; }
    .tsm-lead__row:nth-child(odd) { background: #ffffff; }
    .tsm-lead__row:nth-child(even) { background: #FBE5E7; }
    .tsm-lead__role { font-weight: 700; color: #1a1a1a; }
    .tsm-lead__name { font-weight: 400; color: #1a1a1a; }

    /* === SPEAKER ROSTER === Date / name+category alternating rows */
    .tsm-roster { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width: 100%; flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .tsm-roster__rows { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .tsm-roster__row { flex:1; display:grid; grid-template-columns: 26% 74%; align-items:center; padding: 0.8mm 2mm; font-size: 3.0mm; line-height: 1.15; min-height: 0; }
    .tsm-roster__row:nth-child(odd) { background: white; }
    .tsm-roster__row:nth-child(even) { background: #FBE5E7; }
    .tsm-roster__date { font-weight: 600; color:#1a1a1a; }
    .tsm-roster__name { font-weight: 600; color:#1a1a1a; }
    .tsm-roster__cat { font-weight: 400; color: var(--bni-red); font-size: 2.6mm; }
    .tsm-roster__note { padding: 1.2mm 2mm; background: #FFEDA8; font-size: 2.6mm; color:#444; line-height: 1.25; }

    /* === PHOTO + CAPTION === */
    .tsm-photo { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .tsm-photo__img { flex:1; background:#eee no-repeat center/cover; min-height: 0; }
    .tsm-photo__cap { font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 2.5mm; line-height:1.25; padding: 1.2mm 2mm 0; color:#444; }

    /* === MEMBER REFERRAL TABLE === The paginating workhorse */
    .tsm-mref { width: 100%; height: 100%; display: flex; flex-direction: column; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; border: 1px solid #d9d9d9; }
    .tsm-mref__head { display:grid; grid-template-columns: 6% 32% 22% 18% 22%; background: white; border-bottom: 0.5mm solid var(--bni-red); }
    .tsm-mref__head > div { padding: 1.5mm 2mm; font-weight: 700; color:#222; font-size: 3.4mm; text-align:center; letter-spacing:0.1mm; }
    .tsm-mref__head > div:first-child { text-align:center; }
    .tsm-mref__body { flex:1; display:flex; flex-direction:column; }
    .tsm-mref__row { display:grid; grid-template-columns: 6% 32% 22% 18% 22%; border-bottom: 0.25mm solid #d9d9d9; align-items: stretch; }
    .tsm-mref__row:last-child { border-bottom: 0; }
    .tsm-mref__row.alt { background: #FBE5E7; }
    .tsm-mref__row.empty { background: white; }
    .tsm-mref__row.designation-presenting { background: #D1B4D7; }
    .tsm-mref__row.designation-presenting .tsm-mref__req { background: #F3ECF6; }
    .tsm-mref__row.designation-golden { background: #FFED00; }
    .tsm-mref__row.designation-golden .tsm-mref__req { background: #FFF7B2; }
    .tsm-mref__row.designation-imnew { background: #C3DBAF; }
    .tsm-mref__row.designation-imnew .tsm-mref__req { background: #F1F6ED; }
    .tsm-mref__num { display:flex; align-items:center; justify-content:center; font-weight: 700; font-size: 3.2mm; color:#222; }
    .tsm-mref__member { padding: 1mm 2mm; display:flex; flex-direction: column; justify-content: center; gap: 0.2mm; text-align:center; align-items:center; }
    .tsm-mref__member .name { font-weight: 700; font-size: 3.2mm; line-height: 1.1; color:#111; }
    .tsm-mref__member .phone { font-size: 2.7mm; line-height: 1.1; color:#333; }
    .tsm-mref__member .email { font-size: 2.5mm; line-height: 1.1; color:#555; word-break:break-all; }
    .tsm-mref__member .role { font-size: 2.5mm; line-height: 1.1; color: var(--bni-red); font-style: italic; }
    .tsm-mref__biz { padding: 1mm 2mm; display:flex; align-items:center; justify-content:center; font-size: 2.9mm; text-align:center; line-height:1.15; }
    .tsm-mref__cat { padding: 1mm 2mm; display:flex; align-items:center; justify-content:center; font-size: 2.9mm; text-align:center; line-height:1.15; }
    .tsm-mref__req { padding: 1mm 2mm; border-left: 0.4mm solid #d9d9d9; background: inherit; position: relative; display:flex; align-items:center; justify-content: flex-end; }
    .tsm-mref__req-overlay { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; font-weight: 900; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1; pointer-events:none; }
    .tsm-mref__req-overlay--presenting { color: white; font-size: 7mm; letter-spacing: 0.2mm; text-shadow: 0 0 1mm rgba(0,0,0,0.15); }
    .tsm-mref__req-overlay--golden { color: white; font-size: 8mm; letter-spacing: 0.3mm; text-shadow: 0 0 1mm rgba(0,0,0,0.2); }
    .tsm-mref__req-overlay--imnew { color: white; font-size: 7mm; letter-spacing: 0.2mm; text-shadow: 0 0 1mm rgba(0,0,0,0.15); }
    .tsm-mref__special { font-style: italic; color:#9a9a9a; font-size: 2.8mm; text-align:center; padding: 1mm; align-self:center; justify-self:center; grid-column: 2 / span 1; }

    /* === UPCOMING DATES === */
    .tsm-dates { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width:100%; flex:1; display:flex; flex-direction:column; min-height:0; }
    .tsm-dates__head { display:grid; grid-template-columns: 25% 75%; padding: 1.2mm 2mm; font-weight:700; font-size: 3.2mm; background: white; border-bottom: 0.4mm solid var(--bni-red); color: #222; }
    .tsm-dates__rows { flex:1; display:flex; flex-direction:column; min-height:0; }
    .tsm-dates__row { flex:1; display:grid; grid-template-columns: 25% 75%; align-items:center; padding: 0.8mm 2mm; font-size: 3.2mm; line-height: 1.2; min-height:0; }
    .tsm-dates__row:nth-child(odd) { background: white; }
    .tsm-dates__row:nth-child(even) { background: #FBE5E7; }
    .tsm-dates__row.highlight { background: #FBE5E7; font-weight: 700; }
    .tsm-dates__date { color:#1a1a1a; }
    .tsm-dates__event { color:#1a1a1a; }

    /* === FEATURE PRESENTER === */
    .tsm-feat { background: #F1F6ED; padding: 2mm 3mm; height: 100%; display:flex; flex-direction:column; justify-content:center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; gap: 0.6mm; position: relative; }
    .tsm-feat__title { font-weight: 800; font-size: 4.4mm; color: #1a1a1a; }
    .tsm-feat__sub { font-size: 2.7mm; font-style: italic; color:#333; }
    .tsm-feat__person { font-weight: 700; font-size: 4.4mm; color: var(--bni-red); }
    .tsm-feat__company { font-size: 3.4mm; color:#1a1a1a; }
    .tsm-feat__mic { position:absolute; right: 2mm; top: 50%; transform: translateY(-50%); width: 22mm; height: 22mm; opacity: 0.85; background: no-repeat center/contain; }

    .tsm-next { background: white; padding: 2mm 3mm; height: 100%; display:flex; flex-direction:column; justify-content:center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .tsm-next__label { font-size: 3mm; color:#666; margin-bottom: 0.5mm; }
    .tsm-next__person { font-weight: 700; font-size: 4.4mm; color: var(--bni-red); }
    .tsm-next__company { font-size: 3.4mm; color:#1a1a1a; }

    /* === TARGETING OCCUPATIONS === 2-col list */
    .tsm-tgt { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width:100%; flex:1; display:flex; flex-direction:column; min-height:0; }
    .tsm-tgt__rows { flex:1; display:flex; flex-direction:column; min-height:0; }
    .tsm-tgt__row { flex:1; display:grid; grid-template-columns: 1fr 1fr; align-items:center; font-size: 3.0mm; min-height:0; }
    .tsm-tgt__row:nth-child(odd) { background: white; }
    .tsm-tgt__row:nth-child(even) { background: #FBE5E7; }
    .tsm-tgt__cell { text-align:center; padding: 0.8mm 2mm; line-height:1.2; }

    /* === PODCASTS === Tile row */
    .tsm-pod { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width:100%; flex:1; display:flex; flex-direction:column; gap: 1.5mm; padding: 1.5mm 0 0; min-height:0; }
    .tsm-pod__row { flex:1; display:grid; grid-template-columns: repeat(4, 1fr); gap: 2mm; min-height:0; }
    .tsm-pod__tile { display:flex; flex-direction:column; gap: 0.8mm; }
    .tsm-pod__img { background:#ddd no-repeat center/contain; aspect-ratio: 1 / 1; border-radius: 0.5mm; }
    .tsm-pod__name { font-weight: 700; font-size: 2.6mm; line-height: 1.15; }
    .tsm-pod__host { font-size: 2.3mm; color:#444; line-height: 1.2; }
    .tsm-pod__meta { font-size: 2.3mm; color:#888; }
    .tsm-pod__meta b { color: var(--bni-red); font-weight: 700; }

    /* === LINED WRITING AREA === Education Notes / I Have */
    .tsm-lined { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width:100%; flex:1; display:flex; flex-direction:column; min-height:0; }
    .tsm-lined__head { padding: 0 0 1mm 0; }
    .tsm-lined__title { color: var(--bni-red); font-weight: 800; font-size: 5.2mm; line-height: 1.05; display:inline-block; }
    .tsm-lined__sub { font-style: italic; font-size: 3mm; color:#555; margin-left: 2mm; }
    .tsm-lined__body { flex:1; background: repeating-linear-gradient(to bottom, transparent 0 5.5mm, #c8c8c8 5.5mm 5.7mm); }

    /* === VP REPORT === */
    .tsm-vp { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width:100%; flex:1; display:flex; flex-direction:column; border: 0.3mm solid #ccc; min-height:0; }
    .tsm-vp__h { background: var(--bni-red); color: white; padding: 1.5mm 2mm; font-weight: 800; font-size: 4mm; }
    .tsm-vp__head { display:grid; grid-template-columns: 40% 20% 20% 20%; background: var(--bni-red); color: white; }
    .tsm-vp__head > div { padding: 1mm 2mm; font-size: 2.6mm; font-weight: 700; text-align: center; line-height: 1.2; }
    .tsm-vp__head > div:first-child { text-align: left; }
    .tsm-vp__rows { flex:1; display:flex; flex-direction:column; min-height:0; }
    .tsm-vp__row { flex:1; display:grid; grid-template-columns: 40% 20% 20% 20%; border-bottom: 0.2mm solid #ddd; min-height:0; }
    .tsm-vp__row:last-child { border-bottom: 0; }
    .tsm-vp__row > div { padding: 0.8mm 2mm; font-size: 2.7mm; display:flex; align-items:center; }
    .tsm-vp__row > div:not(:first-child) { justify-content:center; border-left: 0.2mm solid #ddd; }
    .tsm-vp__row.total { font-weight: 700; }

    /* === SCAN QR (Facebook) === */
    .tsm-scan { background: var(--bni-red); color: white; padding: 2mm; height: 100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 1.5mm; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-align: center; }
    .tsm-scan__title { font-weight: 800; font-size: 5.2mm; line-height: 1.05; }
    .tsm-scan__qr { background: white; width: 28mm; height: 28mm; display:flex; align-items:center; justify-content:center; }
    .tsm-scan__qr-fallback { width:90%; height:90%; background: repeating-linear-gradient(45deg, #fff 0 1mm, #000 1mm 1.6mm); }
    .tsm-scan__qr img { width:100%; height:100%; object-fit:contain; }

    /* === FOOTER BAR === Red bottom bar (uses bleed) */
    .tsm-footer {
      background: var(--bni-red); color: white;
      width: 100%; height: 100%;
      display:flex; align-items:center; justify-content:center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700; font-size: 4.6mm; letter-spacing: 0.05mm;
      text-align: center;
      padding: 0 6mm;
    }

    /* === SPONSOR LOGO === */
    .tsm-sponsor { width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding: 1mm; }
    .tsm-sponsor img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* === EDITOR HELPERS === */
    .tsm-block-editor-outline { outline: 1px dashed transparent; }
    .tsm-edit-mode .tsm-block-editor-outline { outline-color: rgba(207,32,48,0.35); }
    .tsm-edit-mode .tsm-block-editor-outline:hover { outline-color: rgba(207,32,48,1); outline-style: solid; }

    /* Scaling wrapper - lets us preview pages at any zoom */
    .tsm-scale-wrap { position: relative; overflow: hidden; }
    .tsm-scale-wrap > .tsm-page { transform-origin: top left; }

    /* Page-break helper between pages in print */
    .tsm-pagebreak { display:none; }

    /* Print styles for trade sheet - 216x303mm (A4 + 3mm bleed) */
    .print-page-break { display: none; }

    /* print-mode: JS-applied class for basic layout reset (no bleed adjustments here) */
    .print-mode *, .print-mode *::before, .print-mode *::after { box-shadow: none !important; }
    .print-mode .sidebar,
    .print-mode .page-header,
    .print-mode .ts-panel,
    .print-mode .no-print,
    .print-mode .status-pipeline,
    .print-mode .tabs { display: none !important; }
    .print-mode body, .print-mode .app-layout, .print-mode .main-content,
    .print-mode .page-body, .print-mode .ts-editor, .print-mode .ts-canvas {
      display: block !important; margin: 0 !important; padding: 0 !important;
      background: white !important; border: none !important; border-radius: 0 !important;
      min-height: auto !important; max-height: none !important; overflow: visible !important;
      width: auto !important;
    }
    .print-mode .main-content { margin-left: 0 !important; }
    .print-mode .ts-scale-wrap { width: 216mm !important; height: 303mm !important; overflow: hidden !important; margin: 0 !important; display: flex !important; align-items: center !important; justify-content: center !important; }
    .print-mode .ts-a4 { width: 210mm !important; height: 297mm !important; transform: none !important; box-shadow: none !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .print-mode .print-page-break { display: block !important; page-break-after: always !important; break-after: page !important; height: 0 !important; }
    /* Modular print-mode rules */
    .print-mode .tsm-canvas, .print-mode .tsm-stack { background:white !important; padding:0 !important; gap:0 !important; }
    .print-mode .tsm-scale-wrap { transform: none !important; width: 216mm !important; height: 303mm !important; }
    .print-mode .tsm-page { box-shadow: none !important; transform: none !important; page-break-after: always !important; break-after: page !important; }
    .print-mode .tsm-page:last-of-type { page-break-after: auto !important; break-after: auto !important; }
    .print-mode .tsm-trim-guide { display: none !important; }

    @media print {
      @page { size: 216mm 303mm; margin: 0; }
      *, *::before, *::after { box-shadow: none !important; }
      body { margin: 0 !important; padding: 0 !important; background: white !important; }
      .sidebar, .page-header, .ts-panel, .no-print, .status-pipeline,
      .tabs { display: none !important; }
      .app-layout, .main-content, .page-body, .ts-editor, .ts-canvas, .tsm-canvas, .tsm-stack {
        display: block !important; margin: 0 !important; padding: 0 !important;
        background: white !important; border: none !important; border-radius: 0 !important;
        min-height: auto !important; max-height: none !important; overflow: visible !important;
        width: auto !important; gap: 0 !important;
      }
      .main-content { margin-left: 0 !important; }
      .ts-scale-wrap { width: 216mm !important; height: 303mm !important; overflow: hidden !important; margin: 0 !important; display: flex !important; align-items: center !important; justify-content: center !important; }
      .ts-a4 { width: 210mm !important; height: 297mm !important; transform: none !important; box-shadow: none !important; overflow: visible !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background-size: 100% 100% !important; }
      .print-page-break { display: block !important; page-break-after: always !important; break-after: page !important; height: 0 !important; }
      /* Modular system print rules */
      .tsm-scale-wrap { transform: none !important; width: 216mm !important; height: 303mm !important; overflow: visible !important; }
      .tsm-page { box-shadow: none !important; transform: none !important; width: 216mm !important; height: 303mm !important; page-break-after: always !important; break-after: page !important; }

          const totalChapters = store.chapters.filter(c => c.status === 'active').length;

          }));
          return { totalChapters, totalMembers, activeSheets, pendingShipping, recentSheets, chapterStats };

        if (parts[0] === 'chapters') {
          if (parts.length === 1 && method === 'GET') {
            return store.chapters.map(c => ({...c, actual_member_count: store.users.filter(u => u.chapter_id === c.id && u.role !== 'admin').length}));

          if (parts.length === 1 && method === 'POST') {
            const ch = {id: store.nextId.chapters++, ...body, member_count: 0, status: 'active'};
            store.chapters.push(ch);
            persistStore();
            return {id: ch.id};
          }
          if (parts.length === 2 && method === 'GET') {
            const ch = store.chapters.find(c => c.id === parseInt(parts[1]));
            const members = store.users.filter(u => u.chapter_id === ch.id);
            return {...ch, members};

          if (parts.length === 2 && method === 'PUT') {
            const ch = store.chapters.find(c => c.id === parseInt(parts[1]));
            Object.assign(ch, body);
            persistStore();
            return {success: true};
          }
        }

          if (parts.length === 1 && method === 'GET') {
            let list = store.users.filter(u => u.role !== 'admin');
            const cid = qs.get('chapter_id');
            if (cid) list = list.filter(u => u.chapter_id === parseInt(cid));
            return list.map(u => ({...u, chapter_name: store.chapters.find(c => c.id === u.chapter_id)?.name})).sort((a,b) => a.name.localeCompare(b.name));
          }
          if (parts.length === 1 && method === 'POST') {
            const u = {id: store.nextId.users++, ...body, role: body.role || 'member'};
            store.users.push(u);
            persistStore();
            return {id: u.id};
          }
          if (parts.length === 2 && method === 'PUT') {
            const u = store.users.find(u => u.id === parseInt(parts[1]));
            if (u) Object.assign(u, body);
            persistStore();
            return {success: true};
          }
          if (parts.length === 2 && method === 'DELETE') {
            store.users = store.users.filter(u => u.id !== parseInt(parts[1]));
            persistStore();
            return {success: true};
          }
        }

        // TRADESHEETS
        if (parts[0] === 'tradesheets') {
          if (parts.length === 1 && method === 'GET') {
            let list = store.tradesheets;
            const cid = qs.get('chapter_id');
            const st = qs.get('status');
            if (cid) list = list.filter(ts => ts.chapter_id === parseInt(cid));
            if (st) list = list.filter(ts => ts.status === st);
            return list;
          }

            const ch = store.chapters.find(c => c.id === body.chapter_id);

          if (parts.length === 2 && method === 'PUT') {
            const ts = store.tradesheets.find(t => t.id === parseInt(parts[1]));
            if (!ts) throw new Error('Not found');
            if (body.status !== undefined) ts.status = body.status;
            if (body.front_cover !== undefined) ts.front_cover = body.front_cover;
            if (body.back_page !== undefined) ts.back_page = body.back_page;
            if (body.template !== undefined) ts.template = body.template;
            if (body.print_copies !== undefined) ts.print_copies = body.print_copies;
            if (body.shipping_address !== undefined) ts.shipping_address = body.shipping_address;
            if (body.referrals !== undefined) {
              ts.referrals = body.referrals.map((r, i) => {
                const u = store.users.find(u => u.id === r.member_id);
                return {...r, member_name: u?.name || r.member_name, business_name: u?.business_name || r.business_name, business_category: u?.business_category || r.business_category};
              });
            }
            ts.updated_at = new Date().toISOString().split('T')[0];
            persistStore();
            return {success: true};
          }
          // Bulk referrals
          if (parts.length === 3 && parts[2] === 'referrals' && method === 'PUT') {
            const ts = store.tradesheets.find(t => t.id === parseInt(parts[1]));
            if (ts && body.referrals) ts.referrals = body.referrals;
            persistStore();
            return {success: true};
          }
        }

        // SHIPPING
        if (parts[0] === 'shipping') {
          if (parts.length === 1 && method === 'GET') return store.shipping;
          if (parts.length === 2 && method === 'PUT') {
            const o = store.shipping.find(s => s.id === parseInt(parts[1]));
            if (o) Object.assign(o, body);
            persistStore();
            return {success: true};
          }
        }

        // ANALYTICS
        if (parts[0] === 'analytics') {
          const chapters = store.chapters.filter(c => c.status === 'active');
          const allMembers = store.users.filter(u => u.role !== 'admin');
          const categories = [...new Set(allMembers.map(m => m.business_category).filter(Boolean))];
          const regions = [...new Set(chapters.map(c => c.region))];

          const chapterPerformance = chapters.map((c, ci) => {
            const memberCount = allMembers.filter(u => u.chapter_id === c.id).length;
            const onTime = [92, 78, 85][ci % 3];
            const health = Math.min(98, Math.round(40 + memberCount * 2.5 + onTime * 0.3));
            return {
              name: c.name, healthScore: health,
              sheetsCompleted: [10, 8, 11][ci % 3], sheetsExpected: 12,
              onTimeRate: onTime,
              avgTurnaroundDays: [2.1, 3.5, 1.8][ci % 3],
              bottleneck: onTime > 75 ? 'None' : 'Content Pending',
              memberTrend: [2, -1, 3][ci % 3]
            };
          });

          const topChapters = [...chapterPerformance].sort((a,b) => b.healthScore - a.healthScore).slice(0,5).map(c => ({...c, region: chapters.find(ch => ch.name === c.name)?.region || ''}));
          const bottomChapters = [...chapterPerformance].sort((a,b) => a.healthScore - b.healthScore).slice(0,3).map(c => ({...c, reason: c.bottleneck !== 'None' ? 'Stuck at ' + c.bottleneck : 'Low member count'}));

          const regional = regions.map(r => {
            const rCh = chapters.filter(c => c.region === r);
            const rPerf = chapterPerformance.filter(p => rCh.some(c => c.name === p.name));
            return {
              region: r, chapters: rCh.length,
              members: rCh.reduce((s,c) => s + allMembers.filter(u => u.chapter_id === c.id).length, 0),
              healthScore: Math.round(rPerf.reduce((s,p) => s + p.healthScore, 0) / (rPerf.length || 1)),
              onTimeRate: Math.round(rPerf.reduce((s,p) => s + p.onTimeRate, 0) / (rPerf.length || 1)),
              avgReferrals: 4.8, avgDelivery: 3.4,
              chapterBreakdown: rCh.map(c => {
                const perf = chapterPerformance.find(p => p.name === c.name);
                return { name: c.name, members: allMembers.filter(u => u.chapter_id === c.id).length, meetingDay: c.meeting_day, healthScore: perf?.healthScore || 50 };
              })
            };
          });

          return {
            overview: {
              avgHealthScore: Math.round(chapterPerformance.reduce((s,c) => s + c.healthScore, 0) / (chapterPerformance.length || 1)),
              onTimeRate: Math.round(chapterPerformance.reduce((s,c) => s + c.onTimeRate, 0) / (chapterPerformance.length || 1)),
              avgReferralsPerWeek: 4.7, avgDeliveryDays: 3.4,
              alerts: [
                {severity:'high', message: (bottomChapters[0]?.name || 'A chapter') + ' has missed 2 consecutive submission deadlines'},
                {severity:'medium', message: Math.max(1, Math.round(allMembers.length * 0.08)) + ' members not on trade sheets for 3+ weeks'},
                {severity:'medium', message: regions[0] + ' region has a chapter below 70% on-time rate'}
              ],
              topChapters, bottomChapters
            },
            chapterPerformance,
            memberEngagement: {
              totalActive: allMembers.length, avgAttendanceRate: 86,
              atRisk: Math.max(1, Math.round(allMembers.length * 0.08)), newLast30: 3,
              topMembers: allMembers.slice(0,5).map((m,i) => ({
                name: m.name, chapter: chapters.find(c => c.id === m.chapter_id)?.name || '', category: m.business_category,
                attendanceRate: [100, 100, 92, 92, 83][i], weeksPresent: [12, 12, 11, 11, 10][i], weeksPossible: 12
              })),
              atRiskMembers: allMembers.slice(-4).map((m,i) => ({
                name: m.name, chapter: chapters.find(c => c.id === m.chapter_id)?.name || '', category: m.business_category,
                weeksMissed: [5, 4, 4, 3][i], lastSeen: ['2026-02-11', '2026-02-18', '2026-02-18', '2026-02-25'][i]
              }))
            },
            referralDensity: {
              totalReferrals: Math.round(allMembers.length * 12 * 1.8),
              avgPerMember: '2.1', estimatedValue: (allMembers.length * 2500).toLocaleString(),
              closedBusiness: Math.round(allMembers.length * 0.4),
              topGivers: allMembers.slice(0,6).map((m,i) => ({name: m.name, category: m.business_category, given: [38,34,31,28,25,22][i]})),
              topReceivers: allMembers.slice(2,8).map((m,i) => ({name: m.name, category: m.business_category, received: [32,29,27,24,21,18][i]})),
              byCategory: categories.slice(0,8).map((cat,i) => ({
                category: cat, given: [24,22,19,17,15,13,11,9][i], received: [18,25,14,20,12,16,8,11][i], tyfcb: [5,4,3,4,2,3,1,2][i]
              }))
            },
            shippingEfficiency: {
              totalPrinted: 28, avgPrintDays: '1.4', avgDeliveryDays: '3.2', onTimeDelivery: 91,
              byChapter: chapters.slice(0,6).map((c,i) => ({
                name: c.name, copies: [50,30,60][i%3],
                approvalToPrint: ['0.5','0.8','0.3'][i%3], printToShip: ['2.1','2.8','1.9'][i%3],
                totalDays: ['3.1','4.1','2.5'][i%3], lateCount: [0,1,0][i%3]
              }))
            },
            contentTrends: {
              customization: chapters.slice(0,4).map((c,i) => ({
                name: c.name, level: ['High','Medium','High','Low'][i],
                details: ['Custom front cover, speaker roster, stack day, back page','Speaker roster and dates updated','Full customization with photos','Default template only'][i]
              })),
              speakerRoster: chapters.slice(0,4).map((c,i) => ({name: c.name, filledSlots: [7,6,7,4][i], totalSlots: 7})),
              stackDayGaps: ['Health & Wellness','Legal - Criminal','Automotive Services','Education & Tutoring','Pet Services','Travel Agent','Florist','Chiropractor']
            },
            regional
          };
        }

        console.warn('Unhandled mock API:', method, path, body);
        return {};
      },
      get: (p) => api.request('GET', p),
      post: (p, b) => api.request('POST', p, b),
      put: (p, b) => api.request('PUT', p, b),
      del: (p) => api.request('DELETE', p),
    };

    // ====================================================================
    // ============== MODULAR TRADESHEET SYSTEM ===========================
    // ====================================================================
    // Pages are 216 x 303 mm (A4 + 3mm bleed). Trim safe area is 210 x 297
    // mm placed inside, divided into a 12 col x 70 row grid (~4.24mm row).
    // Blocks declare {col:{start,span}, row:{start,span}} plus optional bleed.
    // The renderer takes a template + content + members and outputs all
    // pages, including auto-paginated member referral rows.

    // ---------- helpers ----------
    function tsmFormatLongDate(dateStr) {
      if (!dateStr) return null;
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const dn = d.getUTCDate();
        const suffix = (dn % 10 === 1 && dn !== 11) ? 'st' : (dn % 10 === 2 && dn !== 12) ? 'nd' : (dn % 10 === 3 && dn !== 13) ? 'rd' : 'th';
        return { dayName: days[d.getUTCDay()], dayNum: dn, suffix, monthName: months[d.getUTCMonth()], year: d.getUTCFullYear() };
      } catch(e) { return null; }
    }

    function tsmFormatShortDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return d.getUTCDate() + ' ' + months[d.getUTCMonth()];
      } catch(e) { return dateStr; }
    }

    // Resolve a block to its frame in mm relative to the trim safe area's top-left.
    // If block.frame is provided (x,y,w,h in mm), use that directly. Otherwise compute
    // from the legacy 12-col x 70-row grid coords.
    function tsmResolveFrame(block) {
      if (block.frame) return { x: block.frame.x || 0, y: block.frame.y || 0, w: block.frame.w || 0, h: block.frame.h || 0 };
      const colWmm = 210 / 12;
      const rowHmm = 297 / 70;
      const x = ((block.col && block.col.start) ? (block.col.start - 1) : 0) * colWmm;
      const y = ((block.row && block.row.start) ? (block.row.start - 1) : 0) * rowHmm;
      const w = ((block.col && block.col.span) ? block.col.span : 12) * colWmm;
      const h = ((block.row && block.row.span) ? block.row.span : 1) * rowHmm;
      return { x, y, w, h };
    }

    // Compute the absolute style for a block on the page (page is 216 x 303 mm with 3mm
    // bleed inset to the trim safe area at 3mm,3mm). Bleed extends 3mm past trim.
    function tsmFrameStyle(block) {
      const f = tsmResolveFrame(block);
      const b = block.bleed || '';
      const expandL = (b === 'left' || b === 'all' || b === 'horizontal') ? 3 : 0;
      const expandR = (b === 'right' || b === 'all' || b === 'horizontal') ? 3 : 0;
      const expandT = (b === 'top' || b === 'all' || b === 'vertical') ? 3 : 0;
      const expandB = (b === 'bottom' || b === 'all' || b === 'vertical') ? 3 : 0;
      return {
        position: 'absolute',
        left: `${3 + f.x - expandL}mm`,
        top: `${3 + f.y - expandT}mm`,
        width: `${f.w + expandL + expandR}mm`,
        height: `${f.h + expandT + expandB}mm`,
      };
    }

    // Legacy alias - both safe and bleed blocks now use tsmFrameStyle.
    const tsmBlockStyle = tsmFrameStyle;
    const tsmBleedStyle = tsmFrameStyle;

    // ---------- block components ----------
    // Each block receives { fields, content, ctx } where:
    //   fields: per-block configured options (from template)
    //   content: chapter trade-sheet content (frontCover, backPage, members, etc.)
    //   ctx: { chapter, sheet, members, pageIndex, totalPages, designations, ... }

    // Strip "BNI" prefix and reduce to a header-friendly short form.
    // "BNI Royals Kingston" -> "ROYALS"
    // "BNI Manly Sydney" -> "MANLY"
    // The full chapter name is used in the welcome title only if it fits.
    function tsmShortChapterName(name) {
      if (!name) return '';
      const stripped = name.replace(/^BNI\s+/i, '').trim();
      const firstWord = stripped.split(/\s+/)[0] || stripped;
      return firstWord.toUpperCase();
    }

    function BlkHeaderBar({ fields, content, ctx }) {

      const showDatePanel = fields.showDatePanel !== false;
      const dateObj = tsmFormatLongDate(content.frontCover.date || ctx.sheet.week_date);
      // Fallback addresses: prefer explicit content, then placeholder, then chapter data
      const venue = content.frontCover.venue || (ctx.placeholders && ctx.placeholders.venue) || ctx.chapter.meeting_location || '';
      const venueAddr = content.frontCover.venue_address || (ctx.placeholders && ctx.placeholders.venue_address) || '';

              ) : null}
              <div className="tsm-header__rule" />

    function BlkWelcomeTitle({ fields, content, ctx }) {
      const fullName = content.frontCover.headline || ctx.chapter.name || '';
      const shortName = tsmShortChapterName(fullName);
      const text = (fields.text || `Welcome to BNI ${shortName}`).toUpperCase();
      // Auto-fit to width: measure the rendered text and scale down if it overflows
      const wrapRef = React.useRef(null);
      const txtRef = React.useRef(null);
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        if (!wrapRef.current || !txtRef.current) return;
        const wrapW = wrapRef.current.clientWidth;
        const txtW = txtRef.current.scrollWidth;
        if (txtW > 0 && txtW > wrapW) setScale(wrapW / txtW);
        else setScale(1);
      }, [text]);
      return (
        <div className="tsm-welcome" ref={wrapRef}>
          <span className="tsm-welcome__txt" ref={txtRef} style={{ transform: `scale(${scale})` }}>{text}</span>
        </div>
      );
    }

    // ---------- pagination engine ----------
    // Decides how many member-pages to use, what row height to use, and which
    // rows go on which page so the last page is filled (no big gap).
    function tsmPaginateMembers({ referrals, designations, reservedPages, maxPages, capacity }) {
      // capacity: { rowHeightTargetMm, rowsTargetPerPage, tableHeightMm }
      // rowsTargetPerPage = how many rows look "right" at default size.
      const target = capacity.rowsTargetPerPage;
      const minRows = capacity.rowsMinPerPage;
      const maxRows = capacity.rowsMaxPerPage;
      const tableH = capacity.tableHeightMm;
      const N = referrals.length;
      // Total rows we'll show, including 2 trailing "don't miss" slots if we have any blank space on last page
      const totalSlotsAtTarget = reservedPages * target;
      let pages = reservedPages;
      // If members exceed target capacity, add pages
      if (N > pages * maxRows) {
        const needed = Math.ceil(N / maxRows);
        pages = Math.min(maxPages, needed);
      }
      // Compute rows-per-page so the last page is filled. Try to put roughly equal
      // rows on each page, capped to minRows..maxRows.
      // Also reserve 2 trailing slots on the very last page for the special messages
      const showSpecialMessages = (N + 2) <= (pages * maxRows);
      const totalRowsToRender = showSpecialMessages ? (N + 2) : N;
      // rows per page (uniform, but the last page can have fewer if needed)
      let rowsPerPage = Math.ceil(totalRowsToRender / pages);
      // keep rowsPerPage in [minRows, maxRows]
      rowsPerPage = Math.max(minRows, Math.min(maxRows, rowsPerPage));
      // Actual row height in mm: tableH / rowsPerPage
      const rowHeightMm = tableH / rowsPerPage;
      // Build pages
      const out = [];
      let cursor = 0;
      for (let p = 0; p < pages; p++) {
        const remaining = totalRowsToRender - cursor;
        const rowsThisPage = Math.min(rowsPerPage, remaining);
        const rows = [];
        for (let i = 0; i < rowsThisPage; i++) {
          const slotIndex = cursor + i; // overall slot 0-based
          const num = slotIndex + 1;
          const isSpecialSlot = showSpecialMessages && (slotIndex === N || slotIndex === N + 1);
          const r = referrals[slotIndex];
          let designation = null;
          if (designations) {
            if (parseInt(designations.presenting_today) === num) designation = 'presenting';
            else if (parseInt(designations.golden_mic) === num) designation = 'golden';
            else if (parseInt(designations.im_new) === num) designation = 'imnew';
          }
          if (isSpecialSlot) {
            rows.push({ num: num, isEmpty: true, specialMessage: slotIndex === N ? "Don't miss this spot!" : "Blink and it's gone." });
          } else if (r) {
            rows.push({ num, member: { name: r.member_name, business_name: r.business_name, business_category: r.business_category, phone: r.phone, email: r.email, role: r.role }, designation });
          } else {
            rows.push({ num, isEmpty: true });
          }
        }
        // Pad with blank rows so the table fills its height (no gap)
        while (rows.length < rowsPerPage) {
          rows.push({ num: cursor + rows.length + 1, isEmpty: true });
        }
        out.push({ rows, rowHeightMm });
        cursor += rowsPerPage;
      }
      return out;
    }

    // ---------- renderer ----------
    function ModularPage({ page, content, ctx, showTrim, showGrid, gridSize, selectedId, onSelect, onFrameChange, editMode }) {
      const blocks = page.blocks || [];
      const pageRef = React.useRef(null);
      // Drag/resize state
      const [drag, setDrag] = React.useState(null); // {blockId, mode:'move'|'resize-nw'|..., startMouse, startFrame}
      const handleBlockMouseDown = (e, b) => {
        if (!editMode || !onSelect) return;
        e.stopPropagation();
        onSelect(b.id);
        // Start move drag
        const f = tsmResolveFrame(b);
        setDrag({ blockId: b.id, mode: 'move', startMouse: {x:e.clientX, y:e.clientY}, startFrame: f, bleed: b.bleed });
      };
      const handleHandleMouseDown = (e, b, mode) => {
        if (!editMode) return;
        e.stopPropagation();
        const f = tsmResolveFrame(b);
        setDrag({ blockId: b.id, mode, startMouse: {x:e.clientX, y:e.clientY}, startFrame: f, bleed: b.bleed });
      };
      React.useEffect(() => {
        if (!drag || !onFrameChange) return;
        // Convert pixel delta to mm using the page's measured size + zoom (pageRef is at 216mm wide unscaled, page wrapper applies scale)
        const onMove = (ev) => {
          const wrap = pageRef.current && pageRef.current.parentElement;
          if (!wrap) return;
          // The wrapper is at zoom*216mm wide. We need pixels per mm.
          const pxPerMm = (pageRef.current.getBoundingClientRect().width) / 216;
          const dxMm = (ev.clientX - drag.startMouse.x) / pxPerMm;
          const dyMm = (ev.clientY - drag.startMouse.y) / pxPerMm;
          let { x, y, w, h } = drag.startFrame;
          const snap = (v) => gridSize ? Math.round(v / gridSize) * gridSize : v;
          if (drag.mode === 'move') { x = snap(x + dxMm); y = snap(y + dyMm); }
          else if (drag.mode === 'resize-nw') { x = snap(x + dxMm); y = snap(y + dyMm); w = snap(drag.startFrame.w - dxMm); h = snap(drag.startFrame.h - dyMm); }
          else if (drag.mode === 'resize-n')  { y = snap(y + dyMm); h = snap(drag.startFrame.h - dyMm); }
          else if (drag.mode === 'resize-ne') { y = snap(y + dyMm); w = snap(drag.startFrame.w + dxMm); h = snap(drag.startFrame.h - dyMm); }
          else if (drag.mode === 'resize-e')  { w = snap(drag.startFrame.w + dxMm); }
          else if (drag.mode === 'resize-se') { w = snap(drag.startFrame.w + dxMm); h = snap(drag.startFrame.h + dyMm); }
          else if (drag.mode === 'resize-s')  { h = snap(drag.startFrame.h + dyMm); }
          else if (drag.mode === 'resize-sw') { x = snap(x + dxMm); w = snap(drag.startFrame.w - dxMm); h = snap(drag.startFrame.h + dyMm); }
          else if (drag.mode === 'resize-w')  { x = snap(x + dxMm); w = snap(drag.startFrame.w - dxMm); }
          // clamp size
          if (w < 5) w = 5;
          if (h < 5) h = 5;
          onFrameChange(drag.blockId, { x: Math.round(x*10)/10, y: Math.round(y*10)/10, w: Math.round(w*10)/10, h: Math.round(h*10)/10 });
        };
        const onUp = () => setDrag(null);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
      }, [drag, onFrameChange, gridSize]);

      return (
        <div className={`tsm-page${editMode ? ' tsm-edit-mode' : ''}`} ref={pageRef} onMouseDown={() => editMode && onSelect && onSelect(null)}>
          {/* Bleed layer first (behind), safe layer last (front) - but absolute frames decide z naturally */}
          <div className="tsm-bleed-layer">
            {blocks.filter(b => b.bleed).map((b, i) => {
              const Comp = TSM_BLOCKS[b.type] && TSM_BLOCKS[b.type].component;
              if (!Comp) return null;
              const isSel = selectedId === b.id;
              return (
                <div key={b.id || i} className={`tsm-block tsm-block-editor-outline${isSel ? ' tsm-selected' : ''}`} style={tsmFrameStyle(b)} onMouseDown={(e) => handleBlockMouseDown(e, b)}>
                  <Comp fields={b.fields || {}} content={content} ctx={{ ...ctx, block: b }} />
                  {isSel && editMode && ['nw','n','ne','e','se','s','sw','w'].map(p => (
                    <div key={p} className={`tsm-handle ${p}`} onMouseDown={(e) => handleHandleMouseDown(e, b, 'resize-'+p)} />
                  ))}
                </div>
              );
            })}
          </div>
          <div className="tsm-safe">
            {/* Snap grid overlay - shown only in edit mode and when toggled */}
            {editMode && showGrid && gridSize ? (
              <div className="tsm-grid-overlay" style={{
                backgroundImage: `linear-gradient(to right, rgba(0,0,255,0.18) 0.2mm, transparent 0.2mm), linear-gradient(to bottom, rgba(0,0,255,0.18) 0.2mm, transparent 0.2mm)`,
                backgroundSize: `${gridSize}mm ${gridSize}mm`,
              }} />
            ) : null}
            {blocks.filter(b => !b.bleed).map((b, i) => {
              const Comp = TSM_BLOCKS[b.type] && TSM_BLOCKS[b.type].component;
              if (!Comp) return null;
              const isSel = selectedId === b.id;
              return (
                <div key={b.id || i} className={`tsm-block tsm-block-editor-outline${isSel ? ' tsm-selected' : ''}`} style={tsmFrameStyle(b)} onMouseDown={(e) => handleBlockMouseDown(e, b)}>
                  <Comp fields={b.fields || {}} content={content} ctx={{ ...ctx, block: b }} />
                  {isSel && editMode && ['nw','n','ne','e','se','s','sw','w'].map(p => (
                    <div key={p} className={`tsm-handle ${p}`} onMouseDown={(e) => handleHandleMouseDown(e, b, 'resize-'+p)} />
                  ))}
                </div>
              );
            })}
          </div>
          {showTrim && <div className="tsm-trim-guide" />}
        </div>
      );
    }

    function ModularRenderer({ template, content, sheet, chapter, members, placeholders, placeholdersBack, zoom = 1, showTrim = false, editing = false, editMode = false, showGrid = false, gridSize = 5, selectedBlockId, onSelectBlock, onFrameChange }) {
      // Walk template.pages, expanding any 'member_referral' block into possibly multiple pages
      const pages = [];
      const reservedMemberPages = (template.pages || []).filter(p => (p.blocks || []).some(b => b.type === 'member_referral')).length;
      const maxPages = template.maxMemberPages || 6;
      // Compute the table height for member pages from the first member-referral block in the template
      let memberCapacity = { rowsTargetPerPage: 14, rowsMinPerPage: 12, rowsMaxPerPage: 18, tableHeightMm: 254 };
      const firstMrPage = (template.pages || []).find(p => (p.blocks || []).some(b => b.type === 'member_referral'));
      if (firstMrPage) {
        const mr = firstMrPage.blocks.find(b => b.type === 'member_referral');
        if (mr) {
          // Resolve table height from frame (mm) or legacy row span; either is safe.
          const f = tsmResolveFrame(mr);
          memberCapacity.tableHeightMm = (f && f.h) ? f.h : 254;
          memberCapacity.rowsTargetPerPage = mr.fields && mr.fields.rowsTargetPerPage ? mr.fields.rowsTargetPerPage : 14;
          memberCapacity.rowsMinPerPage = mr.fields && mr.fields.rowsMinPerPage ? mr.fields.rowsMinPerPage : 12;
          memberCapacity.rowsMaxPerPage = mr.fields && mr.fields.rowsMaxPerPage ? mr.fields.rowsMaxPerPage : 18;
        }
      }
      const designations = {
        presenting_today: content.frontCover.presenting_today,
        golden_mic: content.frontCover.golden_mic,
        im_new: content.frontCover.im_new,
      };
      const memberPages = tsmPaginateMembers({ referrals: content.referrals || [], designations, reservedPages: Math.max(1, reservedMemberPages), maxPages, capacity: memberCapacity });

      // Find indices of member-referral pages in the template
      const mrIndices = [];
      (template.pages || []).forEach((pp, i) => { if ((pp.blocks || []).some(b => b.type === 'member_referral')) mrIndices.push(i); });
      const lastMrIndex = mrIndices.length ? mrIndices[mrIndices.length - 1] : -1;

      let memberPageCursor = 0;
      (template.pages || []).forEach((p, pageIdx) => {
        const hasMref = (p.blocks || []).some(b => b.type === 'member_referral');
        if (hasMref) {
          // Consume one chunk for this template slot
          const chunk = memberPages[memberPageCursor] || { rows: [], rowHeightMm: undefined };
          pages.push({ pageDef: p, ctx: { memberRows: chunk.rows, memberRowHeightMm: chunk.rowHeightMm, memberPageNumber: memberPageCursor + 1, totalMemberPages: memberPages.length } });
          memberPageCursor++;
          // If this is the last reserved member-referral slot and we still have chunks left,
          // re-emit clones of this same page-shape until all member chunks are placed.
          if (pageIdx === lastMrIndex) {
            while (memberPageCursor < memberPages.length) {
              const c = memberPages[memberPageCursor];
              pages.push({ pageDef: p, ctx: { memberRows: c.rows, memberRowHeightMm: c.rowHeightMm, memberPageNumber: memberPageCursor + 1, totalMemberPages: memberPages.length } });
              memberPageCursor++;
            }
          }
        } else {
          pages.push({ pageDef: p, ctx: {} });
        }
      });

      const baseCtx = { sheet, chapter, members, placeholders: placeholders || {}, placeholdersBack: placeholdersBack || {}, totalPages: pages.length };

      return (
        <div className="tsm-canvas">
          <div className="tsm-stack">
            {pages.map((p, i) => (
              <div key={i} className="tsm-scale-wrap" style={{ width: `${216 * zoom}mm`, height: `${303 * zoom}mm` }}>
                <div style={{ transform: `scale(${zoom})`, transformOrigin: 'top left', width: '216mm', height: '303mm' }}>
                  <ModularPage
                    page={p.pageDef}
                    content={content}
                    ctx={{ ...baseCtx, ...p.ctx, pageIndex: i }}
                    showTrim={showTrim}
                    showGrid={showGrid}
                    gridSize={gridSize}
                    editMode={editMode}
                    selectedId={selectedBlockId}
                    onSelect={onSelectBlock}
                    onFrameChange={(blockId, frame) => onFrameChange && onFrameChange(p.pageDef.id, blockId, frame)}
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

      const updateReferral = (index, field, value) => {
        setReferrals(prev => {

          next[index] = { ...next[index], [field]: value };

            const m = members.find(mm => mm.id === parseInt(value));

      const shortName = chapterName.replace(/^BNI\s*/i, '');

        if (!dateStr) return '';

          const d = new Date(dateStr);
          const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
          const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
          const dayName = days[d.getUTCDay()];
          const dayNum = d.getUTCDate();
          const monthName = months[d.getUTCMonth()];
          const year = d.getUTCFullYear();
          const suffix = dayNum % 10 === 1 && dayNum !== 11 ? 'st' : dayNum % 10 === 2 && dayNum !== 12 ? 'nd' : dayNum % 10 === 3 && dayNum !== 13 ? 'rd' : 'th';
          return `${dayName} ${dayNum}${suffix} ${monthName} ${year}`;

        if (!dateStr) return '';

          const d = new Date(dateStr);
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
