                            <div style={{fontSize:10, color:'#888'}}>{m.weeksPresent}/{m.weeksPossible} weeks</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="card">
                    <div className="card-header"><h3 style={{color:'#DC2626'}}>At-Risk Members</h3></div>
                    <div style={{padding:'0 16px 12px'}}>
                      {data.memberEngagement.atRiskMembers.map((m,i) => (
                        <div key={i} style={{padding:'8px 0', borderBottom:'1px solid #f3f4f6', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                          <div>
                            <div style={{fontWeight:600, fontSize:13}}>{m.name}</div>
                            <div style={{fontSize:11, color:'#888'}}>{m.chapter} - {m.category}</div>
                          </div>
                          <div style={{textAlign:'right'}}>
                            <div style={{fontSize:12, fontWeight:600, color:'#DC2626'}}>{m.weeksMissed} weeks missed</div>
                            <div style={{fontSize:10, color:'#888'}}>Last seen: {m.lastSeen}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ===== REFERRAL DENSITY TAB ===== */}
            {tab === 'referrals' && (
              <div>
                <div className="stats-grid" style={{marginBottom:20}}>
                  <div className="stat-card red">
                    <div className="stat-value">{data.referralDensity.totalReferrals}</div>
                    <div className="stat-label">Total Referrals (12 wk)</div>
                  </div>
                  <div className="stat-card blue">
                    <div className="stat-value">{data.referralDensity.avgPerMember}</div>
                    <div className="stat-label">Avg Per Member/Week</div>
                  </div>
                  <div className="stat-card gold">
                    <div className="stat-value">${data.referralDensity.estimatedValue}</div>
                    <div className="stat-label">Est. Business Generated</div>
                  </div>
                  <div className="stat-card green">
                    <div className="stat-value">{data.referralDensity.closedBusiness}</div>
                    <div className="stat-label">TYFCB This Quarter</div>
                  </div>
                </div>

                <div className="grid-2">
                  <div className="card">
                    <div className="card-header"><h3>Top Referral Givers</h3></div>
                    <div style={{padding:'0 16px 12px'}}>
                      {data.referralDensity.topGivers.map((m,i) => (
                        <div key={i} style={{padding:'6px 0', borderBottom:'1px solid #f3f4f6'}}>
                          <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                            <span style={{fontWeight:600, fontSize:13}}>{m.name}</span>
                            <span style={{fontSize:12, color:'#888'}}>{m.category}</span>
                          </div>
                          <MiniBar value={m.given} max={data.referralDensity.topGivers[0]?.given || 1} color="#059669" />
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="card">
                    <div className="card-header"><h3>Top Referral Receivers</h3></div>
                    <div style={{padding:'0 16px 12px'}}>
                      {data.referralDensity.topReceivers.map((m,i) => (
                        <div key={i} style={{padding:'6px 0', borderBottom:'1px solid #f3f4f6'}}>
                          <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                            <span style={{fontWeight:600, fontSize:13}}>{m.name}</span>
                            <span style={{fontSize:12, color:'#888'}}>{m.category}</span>
                          </div>
                          <MiniBar value={m.received} max={data.referralDensity.topReceivers[0]?.received || 1} color="var(--bni-red)" />
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="card" style={{marginTop:20}}>
                  <div className="card-header"><h3>Referral Flow by Category</h3></div>
                  <div className="table-wrapper">
                    <table>
                      <thead><tr><th>Business Category</th><th>Referrals Given</th><th>Referrals Received</th><th>Net</th><th>TYFCB</th></tr></thead>
                      <tbody>
                        {data.referralDensity.byCategory.map((c,i) => (
                          <tr key={i}>
                            <td style={{fontWeight:600, fontSize:13}}>{c.category}</td>
                            <td><MiniBar value={c.given} max={Math.max(...data.referralDensity.byCategory.map(x=>x.given))} color="#059669" /></td>
                            <td><MiniBar value={c.received} max={Math.max(...data.referralDensity.byCategory.map(x=>x.received))} color="var(--bni-red)" /></td>
                            <td style={{fontWeight:600, color: c.given-c.received >= 0 ? '#059669' : '#DC2626'}}>{c.given-c.received >= 0 ? '+' : ''}{c.given-c.received}</td>
                            <td style={{fontWeight:600}}>{c.tyfcb}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* ===== PRINT & SHIPPING TAB ===== */}
            {tab === 'shipping' && (
              <div>
                <div className="stats-grid" style={{marginBottom:20}}>
                  <div className="stat-card blue">
                    <div className="stat-value">{data.shippingEfficiency.totalPrinted}</div>
                    <div className="stat-label">Sheets Printed (12 wk)</div>
                  </div>
                  <div className="stat-card green">
                    <div className="stat-value">{data.shippingEfficiency.avgPrintDays}d</div>
                    <div className="stat-label">Avg Print Time</div>
                  </div>
                  <div className="stat-card gold">
                    <div className="stat-value">{data.shippingEfficiency.avgDeliveryDays}d</div>
                    <div className="stat-label">Avg Delivery Time</div>
                  </div>
                  <div className="stat-card red">
                    <div className="stat-value">{data.shippingEfficiency.onTimeDelivery}%</div>
                    <div className="stat-label">On-Time Delivery</div>
                  </div>
                </div>

                <div className="card">
                  <div className="card-header"><h3>Shipping Timeline by Chapter</h3></div>
                  <div className="table-wrapper">
                    <table>
                      <thead><tr><th>Chapter</th><th>Copies/Wk</th><th>Approval-to-Print</th><th>Print-to-Ship</th><th>Total Turnaround</th><th>Late Deliveries</th></tr></thead>
                      <tbody>
                        {data.shippingEfficiency.byChapter.map((c,i) => (
                          <tr key={i}>
                            <td style={{fontWeight:600, fontSize:13}}>{c.name}</td>
                            <td>{c.copies}</td>
                            <td style={{fontSize:13}}>{c.approvalToPrint}d</td>
                            <td style={{fontSize:13}}>{c.printToShip}d</td>
                            <td style={{fontSize:13, fontWeight:600}}>{c.totalDays}d</td>
                            <td><span style={{color: c.lateCount > 0 ? '#DC2626' : '#059669', fontWeight:600}}>{c.lateCount}</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* ===== CONTENT TRENDS TAB ===== */}
            {tab === 'content' && (
              <div>
                <div className="grid-2" style={{marginBottom:20}}>
                  <div className="card">
                    <div className="card-header"><h3>Customization Level</h3></div>
                    <div style={{padding:'0 16px 12px'}}>
                      {data.contentTrends.customization.map((c,i) => (
                        <div key={i} style={{padding:'8px 0', borderBottom:'1px solid #f3f4f6'}}>
                          <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                            <span style={{fontWeight:600, fontSize:13}}>{c.name}</span>
                            <span style={{fontSize:12, fontWeight:600, color: c.level === 'High' ? '#059669' : c.level === 'Medium' ? '#D97706' : '#DC2626'}}>{c.level}</span>
                          </div>
                          <div style={{fontSize:11, color:'#888'}}>{c.details}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="card">
                    <div className="card-header"><h3>Speaker Roster Coverage</h3></div>
                    <div style={{padding:'0 16px 12px'}}>
                      {data.contentTrends.speakerRoster.map((c,i) => (
                        <div key={i} style={{padding:'8px 0', borderBottom:'1px solid #f3f4f6'}}>
                          <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                            <span style={{fontWeight:600, fontSize:13}}>{c.name}</span>
                            <span style={{fontSize:12, color:'#888'}}>{c.filledSlots}/{c.totalSlots} slots filled</span>
                          </div>
                          <MiniBar value={c.filledSlots} max={c.totalSlots} color={c.filledSlots === c.totalSlots ? '#059669' : '#D97706'} />
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="card-header"><h3>Stack Day Category Gaps</h3></div>
                  <div style={{padding:'12px 16px'}}>
                    <p style={{fontSize:13, color:'#666', marginBottom:12}}>Categories not yet covered by Stack Days across all chapters:</p>
                    <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
                      {data.contentTrends.stackDayGaps.map((cat,i) => (
                        <span key={i} style={{background:'#FEF3C7', color:'#92400E', padding:'4px 12px', borderRadius:16, fontSize:12, fontWeight:500}}>{cat}</span>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ===== REGIONAL TAB ===== */}
            {tab === 'regions' && (
              <div>
                <div className="card">
                  <div className="card-header"><h3>Regional Performance Comparison</h3></div>
                  <div className="table-wrapper">
                    <table>
                      <thead><tr><th>Region</th><th>Chapters</th><th>Members</th><th>Health Score</th><th>On-Time %</th><th>Referrals/Wk</th><th>Avg Delivery</th></tr></thead>
                      <tbody>
                        {data.regional.map((r,i) => (
                          <tr key={i}>
                            <td style={{fontWeight:700, fontSize:13}}>{r.region}</td>
                            <td>{r.chapters}</td>
                            <td>{r.members}</td>
                            <td><HealthBadge score={r.healthScore} /></td>
                            <td>
                              <div style={{display:'flex', alignItems:'center', gap:6}}>
                                <div style={{width:50, height:6, background:'#f3f4f6', borderRadius:3, overflow:'hidden'}}>
                                  <div style={{width:`${r.onTimeRate}%`, height:'100%', background: r.onTimeRate >= 80 ? '#059669' : '#D97706', borderRadius:3}}/>
                                </div>
                                <span style={{fontSize:12, fontWeight:600}}>{r.onTimeRate}%</span>
                              </div>
                            </td>
                            <td style={{fontWeight:600}}>{r.avgReferrals}</td>
                            <td>{r.avgDelivery}d</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Regional chapter breakdown */}
                {data.regional.map((r,ri) => (
                  <div key={ri} className="card" style={{marginTop:16}}>
                    <div className="card-header"><h3>{r.region}</h3></div>
                    <div style={{padding:'0 16px 12px'}}>
                      {r.chapterBreakdown.map((c,i) => (
                        <div key={i} style={{padding:'8px 0', borderBottom:'1px solid #f3f4f6', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                          <div>
                            <div style={{fontWeight:600, fontSize:13}}>{c.name}</div>
                            <div style={{fontSize:11, color:'#888'}}>{c.members} members - {c.meetingDay}s</div>
                          </div>
                          <HealthBadge score={c.healthScore} />
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>
      );
    }

    function ShippingPage() {
      const [orders, setOrders] = useState([]);
      const loadOrders = () => api.get('/shipping').then(setOrders);
      useEffect(() => { loadOrders(); }, []);

      const updateOrder = async (id, data) => {
        await api.put(`/shipping/${id}`, data);
        loadOrders();
      };

      return (
        <div className="fade-in">
          <div className="page-header">
            <div><h1>Shipping</h1><p>Track print and delivery orders</p></div>
          </div>
          <div className="page-body">
            <div className="card">
              <div className="table-wrapper">
                <table>
                  <thead><tr><th>Chapter</th><th>Week</th><th>Copies</th><th>Status</th><th>Tracking</th><th>Est. Delivery</th><th></th></tr></thead>
                  <tbody>
                    {orders.map(o => (
                      <tr key={o.id}>
                        <td style={{fontWeight:600}}>{o.chapter_name}</td>
                        <td>{o.week_date}</td>
                        <td>{o.copies}</td>
                        <td><Badge status={o.status} /></td>
                        <td style={{fontSize:13}}>{o.tracking_number || '-'}</td>
                        <td style={{fontSize:13}}>{o.estimated_delivery || '-'}</td>
                        <td>
                          <select style={{padding:'6px 8px', border:'1px solid #E5E7EB', borderRadius:4, fontSize:12}}
                            value={o.status} onChange={e => updateOrder(o.id, { status: e.target.value, tracking_number: o.tracking_number || 'AU' + Math.floor(Math.random()*1e9), estimated_delivery: o.estimated_delivery || new Date(Date.now() + 3*86400000).toISOString().split('T')[0] })}>
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="printed">Printed</option>
                            <option value="dispatched">Dispatched</option>
                            <option value="delivered">Delivered</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                    {orders.length === 0 && <tr><td colSpan="7" style={{textAlign:'center', color:'#999', padding:40}}>No shipping orders yet</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // MAIN APP
    function App() {
      // Demo mode: auto-login as admin
      const demoUser = {id:1, email:'benjamin@cornerstoneandcompass.com', name:'Benjamin Marriott', role:'admin', chapter_id:1, chapter_name:'BNI Royals Kingston'};
      const [user, setUser] = useState(demoUser);
      const [token, setToken] = useState(() => {
        api.token = 'demo-token-1';
        return 'demo-token-1';
      });
      const [page, setPage] = useState('dashboard');

      useEffect(() => {
        window.addEventListener('auth-expired', () => { setUser(null); setToken(null); api.token = null; sessionStorage.removeItem('bni_user'); sessionStorage.removeItem('bni_token'); });
      }, []);

      const handleLogin = (userData, tokenData) => {
        setUser(userData);
        setToken(tokenData);
        api.token = tokenData;
        sessionStorage.setItem('bni_user', JSON.stringify(userData));
        sessionStorage.setItem('bni_token', tokenData);
      };

      const handleLogout = () => {
        setUser(null);
        setToken(null);
        api.token = null;
        sessionStorage.removeItem('bni_user');
        sessionStorage.removeItem('bni_token');
      };

      if (!user) return <LoginPage onLogin={handleLogin} />;

      const navItems = [
        { key: 'dashboard', label: 'Dashboard', icon: Icons.dashboard },
        { key: 'chapters', label: 'Chapters', icon: Icons.chapters },
        { key: 'members', label: 'Members', icon: Icons.members },
        { key: 'tradesheets', label: 'Trade Sheets', icon: Icons.tradesheet },
        { key: 'analytics', label: 'Analytics', icon: Icons.analytics },
        { key: 'shipping', label: 'Shipping', icon: Icons.shipping },
      ];

      return (
        <div className="app-layout">
          <div className="sidebar">
            <div className="sidebar-logo">
              <div className="mark"><span>BNI</span></div>
              <div>
                <h2>Trade Sheet<br/>Manager</h2>
                <small>Australia</small>
              </div>
            </div>
            <nav className="sidebar-nav">
              <div className="nav-section">
                <div className="nav-section-title">Main Menu</div>
                {navItems.map(item => (
                  <div key={item.key} className={`nav-item ${page === item.key ? 'active' : ''}`} onClick={() => setPage(item.key)}>
                    {item.icon}
                    {item.label}
                  </div>
                ))}
              </div>
            </nav>
            <div className="sidebar-user">
              <div className="avatar">{user.name?.[0] || 'U'}</div>
              <div className="info">
                <div className="name">{user.name}</div>
                <div className="role">{user.role}</div>
              </div>
              <button className="btn btn-ghost" style={{padding:6, color:'rgba(255,255,255,0.5)'}} onClick={handleLogout}>{Icons.logout}</button>
            </div>
          </div>

          <div className="main-content">
            {page === 'dashboard' && <Dashboard />}
            {page === 'chapters' && <ChaptersPage />}
            {page === 'members' && <MembersPage />}
            {page === 'tradesheets' && <TradeSheetsPage />}
            {page === 'analytics' && <AnalyticsPage />}
            {page === 'shipping' && <ShippingPage />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
