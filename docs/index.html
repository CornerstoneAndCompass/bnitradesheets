<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNI Trade Sheet Manager - Australia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bni-red: #CF2030;
      --bni-red-dark: #A81828;
      --bni-red-light: #E8394A;
      --bni-grey: #58595B;
      --bni-grey-light: #8C8D8F;
      --bni-grey-lighter: #F5F5F5;
      --bni-dark: #1A1A1A;
      --bni-white: #FFFFFF;
      --bni-gold: #C5A55A;
      --bni-success: #10B981;
      --bni-warning: #F59E0B;
      --bni-info: #3B82F6;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.1);
      --shadow-xl: 0 20px 50px -5px rgba(0,0,0,0.15);
      --radius: 8px;
      --radius-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; background: #F0F1F3; color: var(--bni-dark); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* Login Page */
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bni-dark) 0%, #2D1015 50%, var(--bni-red-dark) 100%); position: relative; overflow: hidden; }
    .login-wrapper::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: rgba(207,32,48,0.08); top: -200px; right: -200px; }
    .login-wrapper::after { content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%; background: rgba(207,32,48,0.05); bottom: -100px; left: -100px; }
    .login-card { background: white; border-radius: var(--radius-lg); padding: 48px; width: 420px; box-shadow: var(--shadow-xl); position: relative; z-index: 1; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .bni-mark { width: 80px; height: 80px; background: var(--bni-red); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .login-logo .bni-mark span { color: white; font-weight: 900; font-size: 28px; letter-spacing: 2px; }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--bni-dark); }
    .login-logo p { color: var(--bni-grey-light); font-size: 14px; margin-top: 4px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--bni-grey); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: var(--radius); font-size: 15px; font-family: inherit; transition: all 0.2s; outline: none; background: white; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--bni-red); box-shadow: 0 0 0 3px rgba(207,32,48,0.1); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn { padding: 12px 24px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--bni-red); color: white; }
    .btn-primary:hover { background: var(--bni-red-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-secondary { background: #E5E7EB; color: var(--bni-grey); }
    .btn-secondary:hover { background: #D1D5DB; }
    .btn-success { background: var(--bni-success); color: white; }
    .btn-success:hover { background: #059669; }
    .btn-warning { background: var(--bni-warning); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--bni-red); color: var(--bni-red); }
    .btn-outline:hover { background: var(--bni-red); color: white; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-lg { padding: 14px 32px; font-size: 16px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-ghost { background: transparent; color: var(--bni-grey); }
    .btn-ghost:hover { background: #F3F4F6; }
    .btn-danger { background: #EF4444; color: white; }
    .btn-danger:hover { background: #DC2626; }

    .error-msg { color: var(--bni-red); font-size: 13px; margin-top: 8px; }

    /* Layout */
    .app-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--bni-dark); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
    .sidebar-logo { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
    .sidebar-logo .mark { width: 40px; height: 40px; background: var(--bni-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-logo .mark span { color: white; font-weight: 800; font-size: 14px; }
    .sidebar-logo h2 { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .sidebar-logo small { font-size: 11px; color: rgba(255,255,255,0.4); }

    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section { margin-bottom: 24px; }
    .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); padding: 0 12px; margin-bottom: 8px; font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; font-size: 14px; color: rgba(255,255,255,0.65); font-weight: 500; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active { background: var(--bni-red); color: white; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-user { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
    .sidebar-user .avatar { width: 36px; height: 36px; background: var(--bni-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .sidebar-user .info { flex: 1; min-width: 0; }
    .sidebar-user .name { font-size: 13px; font-weight: 600; }
    .sidebar-user .role { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }

    .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
    .page-header { background: white; padding: 24px 32px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--bni-dark); }
    .page-header p { font-size: 14px; color: var(--bni-grey-light); margin-top: 2px; }
    .page-body { padding: 32px; }

    /* Cards */
    .card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid #E5E7EB; overflow: hidden; }
    .card-header { padding: 20px 24px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 16px; font-weight: 600; }
    .card-body { padding: 24px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid #E5E7EB; position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.red::after { background: var(--bni-red); }
    .stat-card.green::after { background: var(--bni-success); }
    .stat-card.blue::after { background: var(--bni-info); }
    .stat-card.gold::after { background: var(--bni-gold); }
    .stat-card .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .stat-card.red .stat-icon { background: #FEE2E2; color: var(--bni-red); }
    .stat-card.green .stat-icon { background: #D1FAE5; color: var(--bni-success); }
    .stat-card.blue .stat-icon { background: #DBEAFE; color: var(--bni-info); }
    .stat-card.gold .stat-icon { background: #FEF3C7; color: var(--bni-warning); }
    .stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--bni-dark); line-height: 1; }
    .stat-card .stat-label { font-size: 13px; color: var(--bni-grey-light); margin-top: 4px; font-weight: 500; }

    /* Tables */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    table th { text-align: left; padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--bni-grey-light); font-weight: 600; background: #FAFAFA; border-bottom: 1px solid #E5E7EB; }
    table td { padding: 14px 16px; border-bottom: 1px solid #F3F4F6; font-size: 14px; }
    table tr:hover td { background: #FAFAFA; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-draft { background: #F3F4F6; color: var(--bni-grey); }
    .badge-pending { background: #FEF3C7; color: #92400E; }
    .badge-review { background: #DBEAFE; color: #1E40AF; }
    .badge-approved { background: #D1FAE5; color: #065F46; }
    .badge-printing { background: #EDE9FE; color: #5B21B6; }
    .badge-shipped { background: #D1FAE5; color: #065F46; }
    .badge-active { background: #D1FAE5; color: #065F46; }
    .badge-forming { background: #FEF3C7; color: #92400E; }

    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    /* ===== TRADE SHEET SYSTEM ===== */
    .ts-editor { display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: start; }
    .ts-canvas { background: #c8c8c8; border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: flex-start; justify-content: center; min-height: 700px; overflow: auto; }
    .ts-scale-wrap { width: 437px; height: 605px; overflow: hidden; flex-shrink: 0; }
    .ts-a4 { width: 2665px; height: 3692px; transform: scale(0.164); transform-origin: top left; background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.35); font-family: 'Helvetica Neue LT Std', 'Helvetica Neue', 'Roboto', Helvetica, Arial, sans-serif; position: relative; overflow: hidden; }
    .ts-panel { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid #E5E7EB; overflow: hidden; }

    /* Top red banner */
    .ts-topbar { background: var(--bni-red); color: white; display: flex; align-items: center; padding: 12px 14px; flex-shrink: 0; min-height: 83px; }
    .ts-topbar-logo { font-weight: 900; font-size: 28px; letter-spacing: 1px; white-space: nowrap; }
    .ts-topbar-chapter { font-weight: 300; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; margin-left: 4px; }
    .ts-topbar-right { margin-left: auto; text-align: right; font-size: 10px; line-height: 1.4; opacity: 0.95; }
    .ts-topbar-sub { font-size: 16px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-left: auto; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

    /* Section headers - RED bg white text matching photos */
    .ts-hdr { background: var(--bni-red); color: white; font-size: 11px; font-weight: 800; padding: 3px 6px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0; line-height: 1.2; }
    .ts-hdr-dk { font-size: 11px; font-weight: 800; color: var(--bni-dark); border-bottom: 2px solid var(--bni-red); padding-bottom: 2px; margin-bottom: 0; line-height: 1.2; }

    /* Standard trade sheet table */
    .ts-tbl { width: 100%; border-collapse: collapse; font-size: 10px; line-height: 1.3; }
    .ts-tbl th { background: var(--bni-red); color: white; padding: 3px 5px; text-align: left; font-weight: 700; font-size: 9px; text-transform: uppercase; }
    .ts-tbl td { padding: 4px 5px; border-bottom: 1px solid #e0e0e0; }
    .ts-tbl tr:nth-child(even) td { background: #f7f7f7; }

    /* Leadership table - bordered, tight */
    .ts-lead { width: 100%; border-collapse: collapse; font-size: 10px; line-height: 1.35; border: 1px solid #ccc; }
    .ts-lead td { padding: 4px 6px; border: 1px solid #ddd; }
    .ts-lead td:first-child { font-weight: 700; width: 45%; background: #f9f9f9; }

    /* Referral table - fills full page height, source-image scale (2665x3692) */
    .ts-ref { width: 100%; border-collapse: collapse; font-size: 28px; line-height: 1.15; }
    .ts-ref th { padding: 12px; text-align: center; font-weight: 700; font-size: 28px; border-bottom: 3px solid #999; background: white; color: #333; }
    .ts-ref td { border-bottom: 2px solid #ddd; vertical-align: middle; padding: 10px; }
    .ts-ref tr:nth-child(even) td { background: transparent; }
    .ts-ref .rc-num { width: 70px; text-align: center; font-weight: 700; font-size: 30px; vertical-align: middle; }
    .ts-ref .rc-member { text-align: center; }
    .ts-ref .rc-member .m-name { font-weight: 700; font-size: 30px; color: #111; line-height: 1.15; }
    .ts-ref .rc-member .m-phone { font-size: 24px; color: #333; line-height: 1.15; }
    .ts-ref .rc-member .m-email { font-size: 22px; color: #555; line-height: 1.15; word-break: break-all; letter-spacing: 0.5px; }
    .ts-ref .rc-member .m-role { font-size: 22px; color: var(--bni-red); font-weight: 400; line-height: 1.15; font-style: italic; }
    .ts-ref .rc-biz { font-size: 26px; text-align: center; vertical-align: middle; }
    .ts-ref .rc-cat { font-size: 26px; text-align: center; vertical-align: middle; }
    .ts-ref .rc-req { border-left: 3px solid #ccc; }

    /* VP Report table */
    .ts-vp { width: 100%; border-collapse: collapse; font-size: 9px; line-height: 1.3; border: 1px solid #ccc; }
    .ts-vp th { background: var(--bni-red); color: white; padding: 3px 4px; font-size: 8px; font-weight: 700; text-align: center; border: 1px solid var(--bni-red-dark); }
    .ts-vp th:first-child { text-align: left; }
    .ts-vp td { padding: 3px 4px; border: 1px solid #ddd; }
    .ts-vp td:not(:first-child) { text-align: center; }

    /* Footer */
    .ts-foot { background: var(--bni-red); color: white; text-align: center; padding: 5px 8px; font-size: 10px; font-weight: 600; font-style: italic; flex-shrink: 0; line-height: 1.3; }

    /* Form Elements */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--bni-dark); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; transition: all 0.2s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--bni-red); box-shadow: 0 0 0 3px rgba(207,32,48,0.1); }
    .form-group textarea { resize: vertical; min-height: 50px; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal { background: white; border-radius: var(--radius-lg); width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-xl); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 18px; font-weight: 700; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #E5E7EB; display: flex; justify-content: flex-end; gap: 12px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid #E5E7EB; margin-bottom: 24px; }
    .tab { padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--bni-grey-light); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab:hover { color: var(--bni-dark); }
    .tab.active { color: var(--bni-red); border-bottom-color: var(--bni-red); font-weight: 600; }

    /* Status Pipeline */
    .status-pipeline { display: flex; gap: 0; margin: 20px 0; background: #F3F4F6; border-radius: var(--radius); overflow: hidden; }
    .pipeline-step { flex: 1; padding: 12px 16px; text-align: center; font-size: 12px; font-weight: 600; color: var(--bni-grey-light); position: relative; transition: all 0.3s; }
    .pipeline-step.active { background: var(--bni-red); color: white; }
    .pipeline-step.completed { background: var(--bni-success); color: white; }
    .pipeline-step .step-label { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 40px; color: var(--bni-grey-light); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--bni-grey); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* Drag handle */
    .drag-handle { cursor: grab; color: var(--bni-grey-light); padding: 4px; }
    .drag-handle:active { cursor: grabbing; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }

    /* Filter bar */
    .filter-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-bar select { padding: 8px 12px; border: 2px solid #E5E7EB; border-radius: var(--radius); font-size: 13px; font-family: inherit; outline: none; }
    .filter-bar select:focus { border-color: var(--bni-red); }
    .search-input { position: relative; }
    .search-input input { padding: 8px 12px 8px 36px; border: 2px solid #E5E7EB; border-radius: var(--radius); font-size: 13px; font-family: inherit; outline: none; width: 240px; }
    .search-input input:focus { border-color: var(--bni-red); }
    .search-input svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--bni-grey-light); }

    /* Print styles for trade sheet - 216x303mm (A4 + 3mm bleed) */
    .print-page-break { display: none; }

    /* print-mode: JS-applied class for basic layout reset (no bleed adjustments here) */
    .print-mode *, .print-mode *::before, .print-mode *::after { box-shadow: none !important; }
    .print-mode .sidebar,
    .print-mode .page-header,
    .print-mode .ts-panel,
    .print-mode .no-print,
    .print-mode .status-pipeline,
    .print-mode .tabs { display: none !important; }
    .print-mode body, .print-mode .app-layout, .print-mode .main-content,
    .print-mode .page-body, .print-mode .ts-editor, .print-mode .ts-canvas {
      display: block !important; margin: 0 !important; padding: 0 !important;
      background: white !important; border: none !important; border-radius: 0 !important;
      min-height: auto !important; max-height: none !important; overflow: visible !important;
      width: auto !important;
    }
    .print-mode .main-content { margin-left: 0 !important; }
    .print-mode .ts-scale-wrap { width: 216mm !important; height: 303mm !important; overflow: hidden !important; margin: 0 !important; display: flex !important; align-items: center !important; justify-content: center !important; }
    .print-mode .ts-a4 { width: 210mm !important; height: 297mm !important; transform: none !important; box-shadow: none !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .print-mode .print-page-break { display: block !important; page-break-after: always !important; break-after: page !important; height: 0 !important; }

    @media print {
      @page { size: 216mm 303mm; margin: 0; }
      *, *::before, *::after { box-shadow: none !important; }
      body { margin: 0 !important; padding: 0 !important; background: white !important; }
      .sidebar, .page-header, .ts-panel, .no-print, .status-pipeline,
      .tabs { display: none !important; }
      .app-layout, .main-content, .page-body, .ts-editor, .ts-canvas {
        display: block !important; margin: 0 !important; padding: 0 !important;
        background: white !important; border: none !important; border-radius: 0 !important;
        min-height: auto !important; max-height: none !important; overflow: visible !important;
        width: auto !important;
      }
      .main-content { margin-left: 0 !important; }
      .ts-scale-wrap { width: 216mm !important; height: 303mm !important; overflow: hidden !important; margin: 0 !important; display: flex !important; align-items: center !important; justify-content: center !important; }
      .ts-a4 { width: 210mm !important; height: 297mm !important; transform: none !important; box-shadow: none !important; overflow: visible !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background-size: 100% 100% !important; }
      .print-page-break { display: block !important; page-break-after: always !important; break-after: page !important; height: 0 !important; }
      /* Ensure all backgrounds print at full color */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

        const parts = cleanPath.replace(/^\//, '').split('/');
        const qs = new URLSearchParams(queryString || '');

        // AUTH
        if (path === '/auth/login') {
          const u = store.users.find(u => u.email === body.email);
          if (!u) throw new Error('Invalid credentials');
          const ch = u.chapter_id ? store.chapters.find(c => c.id === u.chapter_id) : null;

        }

        // DASHBOARD
        if (path === '/dashboard') {
          const totalChapters = store.chapters.filter(c => c.status === 'active').length;
          const totalMembers = store.users.filter(u => u.role !== 'admin').length;

            name: c.name, region: c.region,
            members: store.users.filter(u => u.chapter_id === c.id && u.role !== 'admin').length,

            latest_status: store.tradesheets.filter(ts => ts.chapter_id === c.id).sort((a,b) => b.id - a.id)[0]?.status || null
          }));
          return { totalChapters, totalMembers, activeSheets, pendingShipping, recentSheets, chapterStats };
        }

        // CHAPTERS
        if (parts[0] === 'chapters') {
          if (parts.length === 1 && method === 'GET') {
            return store.chapters.map(c => ({...c, actual_member_count: store.users.filter(u => u.chapter_id === c.id && u.role !== 'admin').length}));
          }
          if (parts.length === 1 && method === 'POST') {
            const ch = {id: store.nextId.chapters++, ...body, member_count: 0, status: 'active'};
            store.chapters.push(ch);
            return {id: ch.id};
          }
          if (parts.length === 2 && method === 'GET') {
            const ch = store.chapters.find(c => c.id === parseInt(parts[1]));
            const members = store.users.filter(u => u.chapter_id === ch.id);
            return {...ch, members};
          }
          if (parts.length === 2 && method === 'PUT') {
            const ch = store.chapters.find(c => c.id === parseInt(parts[1]));
            Object.assign(ch, body);
            return {success: true};
          }
        }

        // MEMBERS
        if (parts[0] === 'members') {
          if (parts.length === 1 && method === 'GET') {
            let list = store.users.filter(u => u.role !== 'admin');
            const cid = qs.get('chapter_id');
            if (cid) list = list.filter(u => u.chapter_id === parseInt(cid));
            return list.map(u => ({...u, chapter_name: store.chapters.find(c => c.id === u.chapter_id)?.name})).sort((a,b) => a.name.localeCompare(b.name));

          if (parts.length === 1 && method === 'POST') {
            const u = {id: store.nextId.users++, ...body, role: body.role || 'member'};
            store.users.push(u);
            return {id: u.id};
          }
          if (parts.length === 2 && method === 'PUT') {
            const u = store.users.find(u => u.id === parseInt(parts[1]));
            if (u) Object.assign(u, body);
            return {success: true};
          }
          if (parts.length === 2 && method === 'DELETE') {
            store.users = store.users.filter(u => u.id !== parseInt(parts[1]));
            return {success: true};
          }
        }

        if (parts[0] === 'tradesheets') {
          if (parts.length === 1 && method === 'GET') {
            let list = store.tradesheets;
            const cid = qs.get('chapter_id');
            const st = qs.get('status');
            if (cid) list = list.filter(ts => ts.chapter_id === parseInt(cid));
            if (st) list = list.filter(ts => ts.status === st);
            return list;
          }
          if (parts.length === 1 && method === 'POST') {
            const ch = store.chapters.find(c => c.id === body.chapter_id);

            store.tradesheets.push(ts);
            return {id: ts.id};
          }
          if (parts.length === 2 && method === 'GET') {
            const ts = store.tradesheets.find(t => t.id === parseInt(parts[1]));
            if (!ts) throw new Error('Not found');
            const ch = store.chapters.find(c => c.id === ts.chapter_id) || {};
            return {...ts, chapter_name: ch.name, meeting_day: ch.meeting_day, meeting_time: ch.meeting_time, meeting_location: ch.meeting_location};
          }
          if (parts.length === 2 && method === 'PUT') {
            const ts = store.tradesheets.find(t => t.id === parseInt(parts[1]));
            if (!ts) throw new Error('Not found');
            if (body.status !== undefined) ts.status = body.status;
            if (body.front_cover !== undefined) ts.front_cover = body.front_cover;
            if (body.back_page !== undefined) ts.back_page = body.back_page;
            if (body.print_copies !== undefined) ts.print_copies = body.print_copies;
            if (body.shipping_address !== undefined) ts.shipping_address = body.shipping_address;
            if (body.referrals !== undefined) {
              ts.referrals = body.referrals.map((r, i) => {
                const u = store.users.find(u => u.id === r.member_id);
                return {...r, member_name: u?.name || r.member_name, business_name: u?.business_name || r.business_name, business_category: u?.business_category || r.business_category};
              });
            }
            ts.updated_at = new Date().toISOString().split('T')[0];
            return {success: true};
          }
          // Bulk referrals
          if (parts.length === 3 && parts[2] === 'referrals' && method === 'PUT') {
            const ts = store.tradesheets.find(t => t.id === parseInt(parts[1]));
            if (ts && body.referrals) ts.referrals = body.referrals;
            return {success: true};
          }
        }

        // SHIPPING
        if (parts[0] === 'shipping') {
          if (parts.length === 1 && method === 'GET') return store.shipping;
          if (parts.length === 2 && method === 'PUT') {
            const o = store.shipping.find(s => s.id === parseInt(parts[1]));
            if (o) Object.assign(o, body);
            return {success: true};
          }
        }

        // ANALYTICS
        if (parts[0] === 'analytics') {
          const chapters = store.chapters.filter(c => c.status === 'active');
          const allMembers = store.users.filter(u => u.role !== 'admin');
          const categories = [...new Set(allMembers.map(m => m.business_category).filter(Boolean))];
          const regions = [...new Set(chapters.map(c => c.region))];

          const chapterPerformance = chapters.map((c, ci) => {
            const memberCount = allMembers.filter(u => u.chapter_id === c.id).length;
            const onTime = [92, 78, 85][ci % 3];
            const health = Math.min(98, Math.round(40 + memberCount * 2.5 + onTime * 0.3));
            return {
              name: c.name, healthScore: health,
              sheetsCompleted: [10, 8, 11][ci % 3], sheetsExpected: 12,
              onTimeRate: onTime,
              avgTurnaroundDays: [2.1, 3.5, 1.8][ci % 3],
              bottleneck: onTime > 75 ? 'None' : 'Content Pending',
              memberTrend: [2, -1, 3][ci % 3]
            };
          });

          const topChapters = [...chapterPerformance].sort((a,b) => b.healthScore - a.healthScore).slice(0,5).map(c => ({...c, region: chapters.find(ch => ch.name === c.name)?.region || ''}));
          const bottomChapters = [...chapterPerformance].sort((a,b) => a.healthScore - b.healthScore).slice(0,3).map(c => ({...c, reason: c.bottleneck !== 'None' ? 'Stuck at ' + c.bottleneck : 'Low member count'}));

          const regional = regions.map(r => {
            const rCh = chapters.filter(c => c.region === r);
            const rPerf = chapterPerformance.filter(p => rCh.some(c => c.name === p.name));
            return {
              region: r, chapters: rCh.length,
              members: rCh.reduce((s,c) => s + allMembers.filter(u => u.chapter_id === c.id).length, 0),
              healthScore: Math.round(rPerf.reduce((s,p) => s + p.healthScore, 0) / (rPerf.length || 1)),
              onTimeRate: Math.round(rPerf.reduce((s,p) => s + p.onTimeRate, 0) / (rPerf.length || 1)),
              avgReferrals: 4.8, avgDelivery: 3.4,
              chapterBreakdown: rCh.map(c => {
                const perf = chapterPerformance.find(p => p.name === c.name);
                return { name: c.name, members: allMembers.filter(u => u.chapter_id === c.id).length, meetingDay: c.meeting_day, healthScore: perf?.healthScore || 50 };
              })
            };
          });

          return {
            overview: {
              avgHealthScore: Math.round(chapterPerformance.reduce((s,c) => s + c.healthScore, 0) / (chapterPerformance.length || 1)),
              onTimeRate: Math.round(chapterPerformance.reduce((s,c) => s + c.onTimeRate, 0) / (chapterPerformance.length || 1)),
              avgReferralsPerWeek: 4.7, avgDeliveryDays: 3.4,
              alerts: [
                {severity:'high', message: (bottomChapters[0]?.name || 'A chapter') + ' has missed 2 consecutive submission deadlines'},
                {severity:'medium', message: Math.max(1, Math.round(allMembers.length * 0.08)) + ' members not on trade sheets for 3+ weeks'},
                {severity:'medium', message: regions[0] + ' region has a chapter below 70% on-time rate'}
              ],
              topChapters, bottomChapters
            },
            chapterPerformance,
            memberEngagement: {
              totalActive: allMembers.length, avgAttendanceRate: 86,
              atRisk: Math.max(1, Math.round(allMembers.length * 0.08)), newLast30: 3,
              topMembers: allMembers.slice(0,5).map((m,i) => ({
                name: m.name, chapter: chapters.find(c => c.id === m.chapter_id)?.name || '', category: m.business_category,
                attendanceRate: [100, 100, 92, 92, 83][i], weeksPresent: [12, 12, 11, 11, 10][i], weeksPossible: 12
              })),
              atRiskMembers: allMembers.slice(-4).map((m,i) => ({
                name: m.name, chapter: chapters.find(c => c.id === m.chapter_id)?.name || '', category: m.business_category,
                weeksMissed: [5, 4, 4, 3][i], lastSeen: ['2026-02-11', '2026-02-18', '2026-02-18', '2026-02-25'][i]
              }))
            },
            referralDensity: {
              totalReferrals: Math.round(allMembers.length * 12 * 1.8),
              avgPerMember: '2.1', estimatedValue: (allMembers.length * 2500).toLocaleString(),
              closedBusiness: Math.round(allMembers.length * 0.4),
              topGivers: allMembers.slice(0,6).map((m,i) => ({name: m.name, category: m.business_category, given: [38,34,31,28,25,22][i]})),
              topReceivers: allMembers.slice(2,8).map((m,i) => ({name: m.name, category: m.business_category, received: [32,29,27,24,21,18][i]})),
              byCategory: categories.slice(0,8).map((cat,i) => ({
                category: cat, given: [24,22,19,17,15,13,11,9][i], received: [18,25,14,20,12,16,8,11][i], tyfcb: [5,4,3,4,2,3,1,2][i]
              }))
            },
            shippingEfficiency: {
              totalPrinted: 28, avgPrintDays: '1.4', avgDeliveryDays: '3.2', onTimeDelivery: 91,
              byChapter: chapters.slice(0,6).map((c,i) => ({
                name: c.name, copies: [50,30,60][i%3],
                approvalToPrint: ['0.5','0.8','0.3'][i%3], printToShip: ['2.1','2.8','1.9'][i%3],
                totalDays: ['3.1','4.1','2.5'][i%3], lateCount: [0,1,0][i%3]
              }))
            },
            contentTrends: {
              customization: chapters.slice(0,4).map((c,i) => ({
                name: c.name, level: ['High','Medium','High','Low'][i],
                details: ['Custom front cover, speaker roster, stack day, back page','Speaker roster and dates updated','Full customization with photos','Default template only'][i]
              })),
              speakerRoster: chapters.slice(0,4).map((c,i) => ({name: c.name, filledSlots: [7,6,7,4][i], totalSlots: 7})),
              stackDayGaps: ['Health & Wellness','Legal - Criminal','Automotive Services','Education & Tutoring','Pet Services','Travel Agent','Florist','Chiropractor']
            },
            regional
          };
        }

        console.warn('Unhandled mock API:', method, path, body);
        return {};
      },
      get: (p) => api.request('GET', p),
      post: (p, b) => api.request('POST', p, b),
      put: (p, b) => api.request('PUT', p, b),
      del: (p) => api.request('DELETE', p),
    };

      if (viewSheet) return <TradeSheetEditor sheetId={viewSheet} onBack={() => { setViewSheet(null); loadSheets(); }} />;

      return (

              <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>

                        <td>{s.week_date}</td>

                          <button className="btn btn-outline btn-sm" onClick={() => setViewSheet(s.id)}>{Icons.eye} Open</button>

          </div>
          {showCreate && <CreateTradeSheetModal chapters={chapters} onClose={() => setShowCreate(false)} onCreate={id => { setShowCreate(false); setViewSheet(id); }} />}

      );
    }

    function CreateTradeSheetModal({ chapters, onClose, onCreate }) {
      const [chapterId, setChapterId] = useState('');
      const [weekDate, setWeekDate] = useState(new Date().toISOString().split('T')[0]);
      const [copies, setCopies] = useState(50);

      const handleCreate = async () => {
        if (!chapterId) return;
        const data = await api.post('/tradesheets', {
          chapter_id: parseInt(chapterId),
          week_date: weekDate,
          print_copies: copies,
          front_cover: { headline: '', subheadline: 'Weekly Trade Sheet', featured_member: '', featured_member_quote: '', edition: '' },
          back_page: { upcoming_events: '', chapter_stats: {}, contact: '' }
        });
        onCreate(data.id);
      };

      return (
        <Modal title="Create New Trade Sheet" onClose={onClose} footer={<><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleCreate}>Create</button></>}>
          <div className="form-group"><label>Chapter</label>
            <select value={chapterId} onChange={e => setChapterId(e.target.value)}>
              <option value="">Select chapter...</option>
              {chapters.map(c => <option key={c.id} value={c.id}>{c.name} - {c.region}</option>)}
            </select>
          </div>
          <div className="grid-2">
            <div className="form-group"><label>Week Date</label><input type="date" value={weekDate} onChange={e => setWeekDate(e.target.value)} /></div>
            <div className="form-group"><label>Print Copies</label><input type="number" value={copies} onChange={e => setCopies(parseInt(e.target.value))} min="10" max="500" /></div>
          </div>
        </Modal>
      );
    }

      const phStyle = (isPh) => isPh ? {color: '#999', fontStyle: 'italic'} : {};

      const loadSheet = async () => {

          await loadSheet();
        } catch(e) { console.error(e); }
        setSaving(false);
      };

      const updateStatus = async (newStatus) => {
        await api.put(`/tradesheets/${sheetId}`, { status: newStatus });
        loadSheet();
      };

      const addReferral = () => {
        if (members.length === 0) return;
        const m = members[0];
        setReferrals(prev => [...prev, { member_id: m.id, member_name: m.name, business_name: m.business_name, business_category: m.business_category, phone: m.phone, email: m.email, role: m.role, request_text: '' }]);
      };

      const addAllMembers = () => {
        if (members.length === 0) return;
        const existing = new Set(referrals.map(r => r.member_id));
        const newRefs = members.filter(m => !existing.has(m.id)).map(m => ({
          member_id: m.id, member_name: m.name, business_name: m.business_name,
          business_category: m.business_category, phone: m.phone, email: m.email, role: m.role, request_text: ''
        }));
        setReferrals(prev => [...prev, ...newRefs]);
      };

      const updateReferral = (index, field, value) => {
        setReferrals(prev => {
          const next = [...prev];
          next[index] = { ...next[index], [field]: value };
          if (field === 'member_id') {
            const m = members.find(mm => mm.id === parseInt(value));
            if (m) { next[index].member_name = m.name; next[index].business_name = m.business_name; next[index].business_category = m.business_category; next[index].phone = m.phone; next[index].email = m.email; next[index].role = m.role; }
          }
          return next;
        });
      };

      const removeReferral = (index) => setReferrals(prev => prev.filter((_, i) => i !== index));
      const moveReferral = (index, dir) => {
        setReferrals(prev => {
          const next = [...prev];
          const ni = index + dir;
          if (ni < 0 || ni >= next.length) return prev;
          [next[index], next[ni]] = [next[ni], next[index]];
          return next;
        });
      };

      if (!sheet) return <div className="page-body"><p>Loading...</p></div>;

      const statusSteps = ['draft', 'content_pending', 'review', 'approved', 'printing', 'shipped'];
      const currentStep = statusSteps.indexOf(sheet.status);
      const PER_PAGE = 14;
      const leftRefs = referrals.slice(0, PER_PAGE);
      const rightRefs = referrals.slice(PER_PAGE);
      const chapterName = frontCover.headline || sheet.chapter_name || 'BNI Chapter';
      const shortName = chapterName.replace(/^BNI\s*/i, '');

      // Format date for display
      const formatDate = (dateStr) => {
        if (!dateStr) return '';
        try {
          const d = new Date(dateStr);
          const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
          const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
          const dayName = days[d.getUTCDay()];
          const dayNum = d.getUTCDate();
          const monthName = months[d.getUTCMonth()];
          const year = d.getUTCFullYear();
          const suffix = dayNum % 10 === 1 && dayNum !== 11 ? 'st' : dayNum % 10 === 2 && dayNum !== 12 ? 'nd' : dayNum % 10 === 3 && dayNum !== 13 ? 'rd' : 'th';
          return `${dayName} ${dayNum}${suffix} ${monthName} ${year}`;
        } catch(e) { return dateStr; }
      };

      // Short date format for speaker roster (e.g. "18 Mar")
      const formatShortDate = (dateStr) => {
        if (!dateStr) return '';
        try {
          const d = new Date(dateStr);
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          return d.getUTCDate() + ' ' + months[d.getUTCMonth()];
        } catch(e) { return dateStr; }
      };

      const agenda = [
        'Open networking', 'President\'s welcome to visitors & leadership team introduction',
        'Purpose and overview of BNI', 'Networking education',
        'Welcome of new & renewing members', 'Business card box pass around',
        'Visitor introductions', 'Member\'s weekly presentations',
        'Who\'s been paying attention', 'Golden microphone winner',
        'Vice president\'s report', 'Membership committee report',
        'Speaker roster', 'Speaker(s) give their spotlight presentation',
        'Referrals & testimonials.', 'Members pass the referrals from the week and report activity',
        'Referral reality check', 'Treasurers report and invitation to apply',
        'Visitor orientation', 'BNI announcements', 'Meeting Close'
      ];

      const leaders = [
        {role:'President', key:'ldr_pres'}, {role:'Vice President', key:'ldr_vp'},
        {role:'Secretary Treasurer', key:'ldr_sec'}, {role:'Membership Committee', key:'ldr_mem1'},
        {role:'', key:'ldr_mem2'}, {role:'', key:'ldr_mem3'}, {role:'', key:'ldr_mem4'},
        {role:'Visitor Host Coordinator', key:'ldr_vhc'}, {role:'Visitor Hosts', key:'ldr_vh1'},
        {role:'', key:'ldr_vh2'}, {role:'', key:'ldr_vh3'}, {role:'', key:'ldr_vh4'}, {role:'', key:'ldr_vh5'},

        {role:'Mentors', key:'ldr_ment1'}, {role:'', key:'ldr_ment2'},
        {role:'Events & Growth Coordinator', key:'ldr_events'},
        {role:'Go For Green Coordinator', key:'ldr_gfg'},
        {role:'Social Media Coordinator', key:'ldr_social'},
        {role:'Trade Sheet Design', key:'ldr_ts'},
        {role:'Director Consultant', key:'ldr_dc'}
      ];

      const vpKPIs = [
        'Referrals Given', 'Visitors', 'One-to-Ones',
        'Thank You For Closed Business (TYFCB)', 'Thank you for Closed Business - 2026 YTD (10 weeks)',
        'Thank you for Closed Business - 2025 Total', 'Referrals Given - YTD 2026',
        'Average Seat Value - Last 12 Months'
      ];

      // Render one member row for inside pages
      // Get designation colors for a member row number (1-based)
      const getDesignation = (num) => {
        const pt = parseInt(frontCover.presenting_today);
        const gm = parseInt(frontCover.golden_mic);
        const imn = parseInt(frontCover.im_new);
        if (num === pt) return {type:'presenting_today', bg:'#D1B4D7', reqBg:'#F3ECF6'};
        if (num === gm) return {type:'golden_mic', bg:'#FFED00', reqBg:'#FFF7B2'};
        if (num === imn) return {type:'im_new', bg:'#C3DBAF', reqBg:'#F1F6ED'};
        return null;
      };

      const MemberRow = ({ r, num, empty, specialMessage }) => {
        const hasRole = r && r.role && r.role !== 'member';
        const designation = getDesignation(num);
        // Row colors: designation > role-based pink > alternating white/pink

        if (designation) {
          dataBg = designation.bg;
          reqBg = designation.reqBg;

          // Alternates: odd rows white, even rows light pink

        return (
          <tr>
            <td className="rc-num" style={{background: empty ? 'white' : dataBg}}>{num}</td>
            {empty ? (
              <React.Fragment>
                <td className="rc-member" style={{background:'white', textAlign:'center', fontSize:9, color:'#999', fontStyle:'italic', verticalAlign:'middle'}}>

      // Build rows for a referral page
      const buildRefPage = (refs, startNum, isRightPage) => {

      return (
        <div className="fade-in">
          <div className="page-header">

              </button>
              <div>
                <h1>{sheet.chapter_name} - Trade Sheet</h1>
                <p>Week of {sheet.week_date}</p>

            </div>
            <div style={{display:'flex', gap:8, alignItems:'center'}}>

              <button className="btn btn-primary btn-sm" onClick={saveAll} disabled={saving}>{saving ? 'Saving...' : 'Save All'}</button>
              <button className="btn btn-outline btn-sm" onClick={handlePrint}>{Icons.print} Print</button>
              {currentStep > 0 && <button className="btn btn-ghost btn-sm" style={{fontSize:11, color:'#888'}} onClick={() => updateStatus(statusSteps[currentStep - 1])}>

                  {s.replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase())}
                  <span className="step-label">Step {i+1}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Order confirmation banner */}
          {printOrder && printOrder.orderNumber && (
            <div style={{margin:'0 32px 16px', padding:'16px 20px', background:'#ECFDF5', border:'1px solid #A7F3D0', borderRadius:8, display:'flex', alignItems:'center', gap:16}}>
              <div style={{width:36, height:36, borderRadius:'50%', background:'#059669', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" style={{width:18,height:18}}><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700, fontSize:14, color:'#065F46'}}>Sent to Printer</div>
                <div style={{fontSize:12, color:'#555', marginTop:2}}>Order <strong>{printOrder.orderNumber}</strong> submitted {printOrder.date}. Wait for shipping details - check the Shipping page for updates.</div>
              </div>
            </div>
          )}

          <div className="page-body">
            <div className="ts-editor">
              <div style={{flex:1}}>
                {/* Page tabs + Zoom controls */}
                <div className="no-print" style={{display:'flex', gap:6, marginBottom:12, justifyContent:'center', alignItems:'center', flexWrap:'wrap'}}>
                  {[{key:'front',label:'Front Cover'},{key:'inside_left',label:'Inside Left'},{key:'inside_right',label:'Inside Right'},{key:'back',label:'Back Page'}].map(p => (
                    <button key={p.key} className={`btn ${activePage===p.key?'btn-primary':'btn-secondary'} btn-sm`} onClick={() => setActivePage(p.key)}>{p.label}</button>
                  ))}
                  <div style={{marginLeft:16, display:'flex', alignItems:'center', gap:4, background:'white', borderRadius:6, padding:'4px 8px', border:'1px solid #E5E7EB'}}>
                    <button className="btn btn-ghost" style={{padding:'2px 8px', fontSize:16, lineHeight:1, fontWeight:700}} onClick={() => setZoom(z => Math.max(0.08, Math.round((z - 0.03)*1000)/1000))}>-</button>
                    <span style={{fontSize:12, fontWeight:600, minWidth:42, textAlign:'center', color:'var(--bni-grey)'}}>{Math.round(zoom*1000)/10}%</span>
                    <button className="btn btn-ghost" style={{padding:'2px 8px', fontSize:16, lineHeight:1, fontWeight:700}} onClick={() => setZoom(z => Math.min(0.5, Math.round((z + 0.03)*1000)/1000))}>+</button>
                    <button className="btn btn-ghost btn-sm" style={{padding:'2px 8px', fontSize:11}} onClick={() => setZoom(0.164)}>Reset</button>

                            <span style={{fontSize:12, color:'#888'}}>{c.filledSlots}/{c.totalSlots} slots filled</span>
                          </div>
                          <MiniBar value={c.filledSlots} max={c.totalSlots} color={c.filledSlots === c.totalSlots ? '#059669' : '#D97706'} />
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="card-header"><h3>Stack Day Category Gaps</h3></div>
                  <div style={{padding:'12px 16px'}}>
                    <p style={{fontSize:13, color:'#666', marginBottom:12}}>Categories not yet covered by Stack Days across all chapters:</p>
                    <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
                      {data.contentTrends.stackDayGaps.map((cat,i) => (
                        <span key={i} style={{background:'#FEF3C7', color:'#92400E', padding:'4px 12px', borderRadius:16, fontSize:12, fontWeight:500}}>{cat}</span>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ===== REGIONAL TAB ===== */}
            {tab === 'regions' && (
              <div>
                <div className="card">
                  <div className="card-header"><h3>Regional Performance Comparison</h3></div>
                  <div className="table-wrapper">
                    <table>
                      <thead><tr><th>Region</th><th>Chapters</th><th>Members</th><th>Health Score</th><th>On-Time %</th><th>Referrals/Wk</th><th>Avg Delivery</th></tr></thead>
                      <tbody>
                        {data.regional.map((r,i) => (
                          <tr key={i}>
                            <td style={{fontWeight:700, fontSize:13}}>{r.region}</td>
                            <td>{r.chapters}</td>
                            <td>{r.members}</td>
                            <td><HealthBadge score={r.healthScore} /></td>
                            <td>
                              <div style={{display:'flex', alignItems:'center', gap:6}}>
                                <div style={{width:50, height:6, background:'#f3f4f6', borderRadius:3, overflow:'hidden'}}>
                                  <div style={{width:`${r.onTimeRate}%`, height:'100%', background: r.onTimeRate >= 80 ? '#059669' : '#D97706', borderRadius:3}}/>
                                </div>
                                <span style={{fontSize:12, fontWeight:600}}>{r.onTimeRate}%</span>
                              </div>
                            </td>
                            <td style={{fontWeight:600}}>{r.avgReferrals}</td>
                            <td>{r.avgDelivery}d</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Regional chapter breakdown */}
                {data.regional.map((r,ri) => (
                  <div key={ri} className="card" style={{marginTop:16}}>
                    <div className="card-header"><h3>{r.region}</h3></div>
                    <div style={{padding:'0 16px 12px'}}>
                      {r.chapterBreakdown.map((c,i) => (
                        <div key={i} style={{padding:'8px 0', borderBottom:'1px solid #f3f4f6', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                          <div>
                            <div style={{fontWeight:600, fontSize:13}}>{c.name}</div>
                            <div style={{fontSize:11, color:'#888'}}>{c.members} members - {c.meetingDay}s</div>
                          </div>
                          <HealthBadge score={c.healthScore} />
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>
      );
    }

    function ShippingPage() {
      const [orders, setOrders] = useState([]);
      const loadOrders = () => api.get('/shipping').then(setOrders);
      useEffect(() => { loadOrders(); }, []);

      const updateOrder = async (id, data) => {
        await api.put(`/shipping/${id}`, data);
        loadOrders();
      };

      return (
        <div className="fade-in">
          <div className="page-header">
            <div><h1>Shipping</h1><p>Track print and delivery orders</p></div>
          </div>
          <div className="page-body">
            <div className="card">
              <div className="table-wrapper">
                <table>
                  <thead><tr><th>Chapter</th><th>Week</th><th>Copies</th><th>Status</th><th>Tracking</th><th>Est. Delivery</th><th></th></tr></thead>
                  <tbody>
                    {orders.map(o => (
                      <tr key={o.id}>
                        <td style={{fontWeight:600}}>{o.chapter_name}</td>
                        <td>{o.week_date}</td>
                        <td>{o.copies}</td>
                        <td><Badge status={o.status} /></td>
                        <td style={{fontSize:13}}>{o.tracking_number || '-'}</td>
                        <td style={{fontSize:13}}>{o.estimated_delivery || '-'}</td>
                        <td>
                          <select style={{padding:'6px 8px', border:'1px solid #E5E7EB', borderRadius:4, fontSize:12}}
                            value={o.status} onChange={e => updateOrder(o.id, { status: e.target.value, tracking_number: o.tracking_number || 'AU' + Math.floor(Math.random()*1e9), estimated_delivery: o.estimated_delivery || new Date(Date.now() + 3*86400000).toISOString().split('T')[0] })}>
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="printed">Printed</option>
                            <option value="dispatched">Dispatched</option>
                            <option value="delivered">Delivered</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                    {orders.length === 0 && <tr><td colSpan="7" style={{textAlign:'center', color:'#999', padding:40}}>No shipping orders yet</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // MAIN APP
    function App() {
      // Demo mode: auto-login as admin
      const demoUser = {id:1, email:'benjamin@cornerstoneandcompass.com', name:'Benjamin Marriott', role:'admin', chapter_id:1, chapter_name:'BNI Royals Kingston'};
      const [user, setUser] = useState(demoUser);
      const [token, setToken] = useState(() => {
        api.token = 'demo-token-1';
        return 'demo-token-1';
      });
      const [page, setPage] = useState('dashboard');

      useEffect(() => {
        window.addEventListener('auth-expired', () => { setUser(null); setToken(null); api.token = null; sessionStorage.removeItem('bni_user'); sessionStorage.removeItem('bni_token'); });
      }, []);

      const handleLogin = (userData, tokenData) => {
        setUser(userData);
        setToken(tokenData);
        api.token = tokenData;
        sessionStorage.setItem('bni_user', JSON.stringify(userData));
        sessionStorage.setItem('bni_token', tokenData);
      };

      const handleLogout = () => {
        setUser(null);
        setToken(null);
        api.token = null;
        sessionStorage.removeItem('bni_user');
        sessionStorage.removeItem('bni_token');
      };

      if (!user) return <LoginPage onLogin={handleLogin} />;

      const navItems = [
        { key: 'dashboard', label: 'Dashboard', icon: Icons.dashboard },
        { key: 'chapters', label: 'Chapters', icon: Icons.chapters },
        { key: 'members', label: 'Members', icon: Icons.members },
        { key: 'tradesheets', label: 'Trade Sheets', icon: Icons.tradesheet },
        { key: 'analytics', label: 'Analytics', icon: Icons.analytics },
        { key: 'shipping', label: 'Shipping', icon: Icons.shipping },
      ];

      return (
        <div className="app-layout">
          <div className="sidebar">
            <div className="sidebar-logo">
              <div className="mark"><span>BNI</span></div>
              <div>
                <h2>Trade Sheet<br/>Manager</h2>
                <small>Australia</small>
              </div>
            </div>
            <nav className="sidebar-nav">
              <div className="nav-section">
                <div className="nav-section-title">Main Menu</div>
                {navItems.map(item => (
                  <div key={item.key} className={`nav-item ${page === item.key ? 'active' : ''}`} onClick={() => setPage(item.key)}>
                    {item.icon}
                    {item.label}
                  </div>
                ))}
              </div>
            </nav>
            <div className="sidebar-user">
              <div className="avatar">{user.name?.[0] || 'U'}</div>
              <div className="info">
                <div className="name">{user.name}</div>
                <div className="role">{user.role}</div>
              </div>
              <button className="btn btn-ghost" style={{padding:6, color:'rgba(255,255,255,0.5)'}} onClick={handleLogout}>{Icons.logout}</button>
            </div>
          </div>

          <div className="main-content">
            {page === 'dashboard' && <Dashboard />}
            {page === 'chapters' && <ChaptersPage />}
            {page === 'members' && <MembersPage />}
            {page === 'tradesheets' && <TradeSheetsPage />}
            {page === 'analytics' && <AnalyticsPage />}
            {page === 'shipping' && <ShippingPage />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
